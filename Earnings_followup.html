<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실적 팔로업 - 마켓 대시보드</title>
<style>
:root {
  --bg: #1a1a1a;
  --bg-2: #1f1f1f;
  --bg-3: #2a2a2a;
  --border: #333;
  --border-2: #444;
  --text: #e0e0e0;
  --text-dim: #999;
  --text-bright: #fff;
  --accent: #4a90d9;
  --t1: #ffd700;
  --t2: #4a90d9;
  --t3: #888;
  --done: #4caf50;
  --pending: #555;
  --signal: #b9c5d4;
}
* { box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
  margin: 0; padding: 1.5rem;
  line-height: 1.5; font-size: 0.9rem;
}
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 2px solid var(--border-2); }
h1 { color: var(--text-bright); margin: 0; font-size: 1.6rem; }
h2 { color: var(--text-bright); margin: 1.5rem 0 0.8rem; font-size: 1.15rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
h3 { color: var(--text-bright); margin: 0.8rem 0 0.4rem; font-size: 1rem; }
.quarter-selector { display: flex; gap: 0.5rem; align-items: center; }
.quarter-selector button, .quarter-selector select { background: var(--bg-3); color: var(--text); border: 1px solid var(--border-2); padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
.quarter-selector button:hover { background: var(--accent); color: var(--text-bright); }
.search-box { background: var(--bg-3); color: var(--text); border: 1px solid var(--border-2); padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; min-width: 200px; }
.summary-row { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.watchlist-box, .progress-box { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 0.8rem 1rem; }
.tier-line { margin: 0.3rem 0; font-size: 0.88rem; }
.tier-badge { display: inline-block; min-width: 1.6rem; text-align: center; padding: 0.05rem 0.4rem; border-radius: 3px; font-weight: 600; margin-right: 0.4rem; font-size: 0.8rem; }
.tier-T1 { background: var(--t1); color: #000; }
.tier-T2 { background: var(--t2); color: #fff; }
.tier-T3 { background: var(--t3); color: #fff; }
.progress-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
.stat { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
.stat-value { font-size: 1.4rem; font-weight: 700; color: var(--text-bright); }
.stat-label { font-size: 0.78rem; color: var(--text-dim); }
.sector-grid-t1 { display: grid; grid-template-columns: 1fr; gap: 0.8rem; margin-bottom: 1.5rem; }
.sector-grid-t2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; margin-bottom: 1.5rem; }
.sector-grid-t3 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; margin-bottom: 1.5rem; }
.sector-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 0.8rem 1rem; transition: border-color 0.15s; }
.sector-card.t1 { border-left: 4px solid var(--t1); }
.sector-card.t2 { border-left: 4px solid var(--t2); }
.sector-card.t3 { border-left: 4px solid var(--t3); }
.sector-card:hover { border-color: var(--accent); }
.sector-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
.sector-name { color: var(--text-bright); font-size: 1.05rem; font-weight: 600; }
.sector-meta { font-size: 0.78rem; color: var(--text-dim); }
.stock-list { margin-top: 0.5rem; }
.stock-row { display: grid; grid-template-columns: minmax(220px, 1.8fr) 90px auto; gap: 0.5rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--bg-3); }
.stock-row:last-child { border-bottom: 0; }
.stock-info { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
.stock-name-row { color: var(--text); display: flex; align-items: baseline; gap: 0.3rem; flex-wrap: wrap; }
.stock-name { font-weight: 500; }
.ticker { color: var(--text-dim); font-size: 0.78rem; }
.stock-followup { color: var(--signal); font-size: 0.78rem; opacity: 0.85; padding-left: 0.1rem; }
.progress-circles { display: inline-flex; gap: 0.2rem; align-items: center; }
.circle { display: inline-block; width: 0.7rem; height: 0.7rem; border-radius: 50%; background: var(--done); }
.circle.empty { background: transparent; border: 1px solid var(--pending); }
.mode-buttons { display: flex; gap: 0.3rem; justify-content: flex-end; }
.mode-btn { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.5rem; background: var(--bg-3); color: var(--text); border: 1px solid var(--border-2); border-radius: 3px; font-size: 0.75rem; cursor: pointer; text-decoration: none; transition: all 0.15s; }
.mode-btn:hover { background: var(--accent); color: var(--text-bright); border-color: var(--accent); }
.dday-cell { font-size: 0.8rem; color: var(--text-dim); }
.collapsible-toggle { color: var(--accent); cursor: pointer; user-select: none; margin-bottom: 0.5rem; font-size: 0.85rem; }
.hidden { display: none; }
.loading { color: var(--text-dim); font-style: italic; padding: 1rem; }
.error-box { background: #3a1f1f; border: 1px solid #c44; padding: 0.6rem 1rem; border-radius: 4px; margin: 0.5rem 0; font-size: 0.85rem; }
footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim); font-size: 0.8rem; }
</style>
</head>
<body>

<header>
  <div>
    <h1>실적 팔로업</h1>
    <div style="color: var(--text-dim); font-size: 0.85rem; margin-top: 0.2rem;">분기별 종목·섹터 실적 분석 아카이브</div>
  </div>
  <div class="quarter-selector">
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 종목·섹터 검색...">
    <button id="prevQuarter">◀ 이전 분기</button>
    <select id="quarterSelect">
      <option value="2026-Q1" selected>2026-Q1</option>
      <option value="2025-Q4">2025-Q4</option>
      <option value="2025-Q3">2025-Q3</option>
      <option value="2026-Q2">2026-Q2</option>
    </select>
    <button id="nextQuarter">다음 분기 ▶</button>
  </div>
</header>

<div class="summary-row">
  <div class="watchlist-box">
    <h3 style="margin-top: 0;">📋 워치리스트 — <span id="currentQuarterLabel">2026-Q1</span></h3>
    <div id="watchlistSummary" class="loading">워치리스트 로딩...</div>
  </div>
  <div class="progress-box">
    <h3 style="margin-top: 0;">📊 진행률</h3>
    <div id="progressStats" class="progress-stats">
      <div class="stat"><div class="stat-value" id="statP">-</div><div class="stat-label">Preview</div></div>
      <div class="stat"><div class="stat-value" id="statR">-</div><div class="stat-label">Review</div></div>
    </div>
  </div>
</div>

<h2>🌟 T1 메인 (분기 주도 섹터)</h2>
<div id="t1Sectors" class="sector-grid-t1">
  <div class="loading">섹터 데이터 로딩...</div>
</div>

<h2>🔵 T2 주도 후보</h2>
<div id="t2Sectors" class="sector-grid-t2"></div>

<h2>⚪ T3 트래킹 <span class="collapsible-toggle" id="t3Toggle">▼ 펼치기</span></h2>
<div id="t3Sectors" class="sector-grid-t3 hidden"></div>

<footer>
  최종 갱신: <span id="lastUpdate">-</span> · 데이터 source: watchlist.md, 실적_캘린더.md, manifest.json
</footer>

<script>
// ============================================================
// 데이터 source 경로 (GH Pages 기준)
// ============================================================
const DATA_PATHS = {
  watchlist: 'earnings/watchlist.md',
  calendar: 'earnings_calendar.md',
  manifest: 'earnings/manifest.json'
};

// ============================================================
// 상태
// ============================================================
let state = {
  currentQuarter: '2026-Q1',
  watchlist: { T1: [], T2: [], T3: [] },
  calendar: {},        // {stockName: {date, ticker, sector, note, isArchive}}
  signals: {},         // {stockName: {ticker, sector, signal}} — "추적 종목" 섹션
  manifest: { preview: [], review: [], 'in-depth': [] }
};

// ============================================================
// 유틸
// ============================================================
function $(id) { return document.getElementById(id); }
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

// ============================================================
// 데이터 fetch + parse
// ============================================================
async function fetchText(path) {
  try {
    const r = await fetch(path);
    if (!r.ok) throw new Error(r.status);
    return await r.text();
  } catch (e) {
    console.error('Fetch failed:', path, e);
    return null;
  }
}

async function fetchJson(path) {
  try {
    const r = await fetch(path);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch (e) {
    console.error('Fetch JSON failed:', path, e);
    return null;
  }
}

function parseWatchlist(md) {
  const result = { T1: [], T2: [], T3: [] };
  let currentTier = null;
  const lines = md.split('\n');
  for (const line of lines) {
    if (/^##\s+섹터\s*T1/.test(line)) currentTier = 'T1';
    else if (/^##\s+섹터\s*T2/.test(line)) currentTier = 'T2';
    else if (/^##\s+섹터\s*T3/.test(line)) currentTier = 'T3';
    else if (/^##\s/.test(line)) currentTier = null;  // 다른 ## 헤더 (예: tier 운영 룰 요약) → 리셋
    else if (currentTier && /^\s*-\s+/.test(line)) {
      // - **섹터명** (종목1, 종목2, ...) 패턴만 매칭. 운영 룰 라인은 (종목 list) 형태가 아니므로 자연 제외
      const m = line.match(/-\s+\*?\*?([가-힣\w\s]+?)\*?\*?\s*\(([^)]+)\)/);
      if (m) {
        const sector = m[1].trim();
        const stocks = m[2].split(',').map(s => s.trim()).filter(Boolean);
        // 종목 list 안에 "팔로업" 같은 단어 있으면 잘못 매칭일 가능성 — 한 번 더 필터
        const looksLikeStocks = stocks.every(s => s.length < 30 && !/[:%]/.test(s));
        if (looksLikeStocks) {
          result[currentTier].push({ sector, stocks: stocks.map(name => ({ name, ticker: '' })) });
        }
      }
    }
  }
  return result;
}

function parseCalendar(md) {
  const result = { calendar: {}, signals: {} };
  const lines = md.split('\n');
  let inSignalSection = false;
  let inEarningsSection = false;
  let inTable = false;

  for (const line of lines) {
    if (/^##\s/.test(line)) {
      inSignalSection = /추적\s*종목/.test(line);
      inEarningsSection = /실적\s*발표\s*일정|아카이브/.test(line);
      inTable = false;
    }
    // 발표 일정 / 아카이브 표 헤더
    if (inEarningsSection && /^\|\s*날짜\s*\|/.test(line)) {
      inTable = 'earnings';
    }
    // 추적 종목 표 헤더
    else if (inSignalSection && /^\|\s*티커\s*\|/.test(line)) {
      inTable = 'signal';
    }
    else if (inTable && /^\|/.test(line) && !/^\|\s*-+/.test(line)) {
      const cells = line.split('|').map(c => c.trim()).filter(c => c !== '');
      if (cells.length < 3) continue;

      if (inTable === 'earnings') {
        const date = cells[0];
        const nameTickerRaw = cells[1];
        const sector = cells[2];
        const note = cells[3] || '';
        const tickerMatch = nameTickerRaw.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
        const name = tickerMatch ? tickerMatch[1].trim() : nameTickerRaw.trim();
        const ticker = tickerMatch ? tickerMatch[2].trim() : '';
        result.calendar[name] = { date, ticker, sector, note };
      }
      else if (inTable === 'signal') {
        const ticker = cells[0] === '—' ? '' : cells[0];
        const name = cells[1];
        const signal = cells[2];
        if (name && signal) {
          result.signals[name] = { ticker, signal };
        }
      }
    }
    // 빈 줄 또는 ## 만나면 표 종료
    if (/^\s*$/.test(line) || /^##/.test(line)) inTable = false;
  }
  return result;
}

function getModeFile(stockName, mode) {
  const suffix = mode === 'preview' ? '프리뷰' : mode === 'review' ? '리뷰' : '인뎁스';
  const expected = `${state.currentQuarter}_${stockName}_${suffix}.html`;
  const list = state.manifest[mode] || [];
  return list.includes(expected) ? expected : null;
}

function getProgressStage(stockName) {
  if (getModeFile(stockName, 'in-depth')) return 3;
  if (getModeFile(stockName, 'review')) return 2;
  if (getModeFile(stockName, 'preview')) return 1;
  return 0;
}

function buildHtmlPath(mode, file) {
  return `earnings/earnings-${mode}/${file}`;
}

// ============================================================
// 렌더링
// ============================================================
function renderWatchlistSummary() {
  const wl = state.watchlist;
  const lines = [];
  for (const tier of ['T1', 'T2', 'T3']) {
    const sectors = wl[tier];
    if (sectors.length === 0) continue;
    const sectorNames = sectors.map(s => s.sector).join(' · ');
    lines.push(`<div class="tier-line"><span class="tier-badge tier-${tier}">${tier}</span>${sectorNames} <span style="color:var(--text-dim);">(${sectors.length}개 섹터, ${sectors.reduce((sum, s) => sum + s.stocks.length, 0)}개 종목)</span></div>`);
  }
  $('watchlistSummary').innerHTML = lines.join('');
}

function renderProgress() {
  let totalStocks = 0, p = 0, r = 0;
  for (const tier of ['T1', 'T2', 'T3']) {
    for (const sec of state.watchlist[tier]) {
      for (const stock of sec.stocks) {
        totalStocks++;
        if (getModeFile(stock.name, 'preview')) p++;
        if (getModeFile(stock.name, 'review')) r++;
      }
    }
  }
  $('statP').textContent = `${p}/${totalStocks}`;
  $('statR').textContent = `${r}/${totalStocks}`;
}

function renderProgressCircles(stage) {
  const container = el('span', { class: 'progress-circles' });
  for (let i = 1; i <= 3; i++) {
    container.appendChild(el('span', { class: i <= stage ? 'circle' : 'circle empty' }));
  }
  return container;
}

function renderStockRow(stock) {
  const cal = state.calendar[stock.name];
  const sig = state.signals[stock.name];
  const stage = getProgressStage(stock.name);
  const stockRow = el('div', { class: 'stock-row' });

  // 종목 정보 (이름 + 티커 + 팔로업 사항)
  const ticker = (cal && cal.ticker) || (sig && sig.ticker) || '';
  const followup = sig ? sig.signal : '';
  const info = el('div', { class: 'stock-info' });
  const nameRow = el('div', { class: 'stock-name-row' }, [
    el('span', { class: 'stock-name' }, stock.name),
    ticker ? el('span', { class: 'ticker' }, `(${ticker})`) : null
  ]);
  info.appendChild(nameRow);
  if (followup) {
    info.appendChild(el('div', { class: 'stock-followup' }, '↳ ' + followup));
  }
  stockRow.appendChild(info);

  // 진행 단계 (원 N개)
  const middleCol = el('div', null, [
    cal && cal.date ? el('div', { class: 'dday-cell' }, cal.date) : el('div', { class: 'dday-cell' }, '발표일 미정'),
    renderProgressCircles(stage)
  ]);
  stockRow.appendChild(middleCol);

  // 작성된 모드 클릭 가능 라벨
  const buttons = el('div', { class: 'mode-buttons' });
  let hasAny = false;
  for (const [mode, label] of [['preview', 'P'], ['review', 'R'], ['in-depth', 'I']]) {
    const file = getModeFile(stock.name, mode);
    if (file) {
      buttons.appendChild(el('a', {
        class: 'mode-btn',
        href: buildHtmlPath(mode, file),
        target: '_blank',
        title: label + ': ' + file
      }, label));
      hasAny = true;
    }
  }
  if (!hasAny) {
    buttons.appendChild(el('span', { class: 'sector-meta', style: 'opacity:0.5;' }, '미작성'));
  }
  stockRow.appendChild(buttons);

  return stockRow;
}

function renderSectorCard(sectorObj, tier) {
  const card = el('div', { class: `sector-card ${tier.toLowerCase()}` });
  const header = el('div', { class: 'sector-header' }, [
    el('div', { class: 'sector-name' }, sectorObj.sector),
    el('div', { class: 'sector-meta' }, `종목 ${sectorObj.stocks.length}개 · ${tier}`)
  ]);
  card.appendChild(header);

  // 진행률 (P, R)
  let pCount = 0, rCount = 0;
  for (const stock of sectorObj.stocks) {
    if (getModeFile(stock.name, 'preview')) pCount++;
    if (getModeFile(stock.name, 'review')) rCount++;
  }
  const meta = el('div', { class: 'sector-meta', style: 'margin-bottom: 0.4rem;' },
    `진행: P ${pCount}/${sectorObj.stocks.length} · R ${rCount}/${sectorObj.stocks.length}`);
  card.appendChild(meta);

  // 종목 리스트 (T1·T2·T3 모두 동일 포맷)
  const stockList = el('div', { class: 'stock-list' });
  for (const stock of sectorObj.stocks) {
    stockList.appendChild(renderStockRow(stock));
  }
  card.appendChild(stockList);

  // 푸터 라인 제거됨 (BT 요청)

  return card;
}

function renderSectors() {
  const t1Container = $('t1Sectors');
  const t2Container = $('t2Sectors');
  const t3Container = $('t3Sectors');
  t1Container.innerHTML = '';
  t2Container.innerHTML = '';
  t3Container.innerHTML = '';

  for (const sec of state.watchlist.T1) t1Container.appendChild(renderSectorCard(sec, 'T1'));
  for (const sec of state.watchlist.T2) t2Container.appendChild(renderSectorCard(sec, 'T2'));
  for (const sec of state.watchlist.T3) t3Container.appendChild(renderSectorCard(sec, 'T3'));

  if (state.watchlist.T1.length === 0) t1Container.innerHTML = '<div class="loading">T1 섹터 없음</div>';
  if (state.watchlist.T2.length === 0) t2Container.innerHTML = '<div class="loading">T2 섹터 없음</div>';
  if (state.watchlist.T3.length === 0) t3Container.innerHTML = '<div class="loading">T3 섹터 없음</div>';
}

// ============================================================
// 검색
// ============================================================
function setupSearch() {
  $('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.sector-card').forEach(card => {
      const text = card.textContent.toLowerCase();
      card.style.display = (q === '' || text.includes(q)) ? '' : 'none';
    });
  });
}

// ============================================================
// T3 토글
// ============================================================
function setupT3Toggle() {
  $('t3Toggle').addEventListener('click', () => {
    const t3 = $('t3Sectors');
    const toggle = $('t3Toggle');
    if (t3.classList.contains('hidden')) {
      t3.classList.remove('hidden');
      toggle.textContent = '▲ 접기';
    } else {
      t3.classList.add('hidden');
      toggle.textContent = '▼ 펼치기';
    }
  });
}

// ============================================================
// 분기 셀렉터
// ============================================================
function setupQuarterSelector() {
  $('quarterSelect').addEventListener('change', (e) => {
    state.currentQuarter = e.target.value;
    $('currentQuarterLabel').textContent = state.currentQuarter;
    renderProgress();
    renderSectors();
  });
}

// ============================================================
// 메인
// ============================================================
async function init() {
  const wlText = await fetchText(DATA_PATHS.watchlist);
  if (wlText) {
    state.watchlist = parseWatchlist(wlText);
  } else {
    $('watchlistSummary').innerHTML = '<div class="error-box">watchlist.md 로드 실패. earnings/watchlist.md 경로 확인 필요.</div>';
  }

  const calText = await fetchText(DATA_PATHS.calendar);
  if (calText) {
    const parsed = parseCalendar(calText);
    state.calendar = parsed.calendar;
    state.signals = parsed.signals;
  }

  const manifest = await fetchJson(DATA_PATHS.manifest);
  if (manifest) state.manifest = manifest;

  renderWatchlistSummary();
  renderProgress();
  renderSectors();

  setupSearch();
  setupT3Toggle();
  setupQuarterSelector();

  $('lastUpdate').textContent = new Date().toLocaleString('ko-KR');
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
