### ② 산업 분류

- 산업: **반도체** (사이클 산업 list 포함)
- DART 분류: 전기·전자 (코드 264)
- 워치리스트 섹터: T1 — 반도체

### ③ 분류 결정 논리

(1) **가장 매출 큰 사업부 기준** 적용 시 DX (188조) > DS (130조) → 일견 지속성장
(2) **단, 사이클 사업부 영업이익 비중 우선** sub-rule 적용:
   - DS 매출 비중 39%, 영업이익 비중 57% (메모리 마진 영향력)
   - 사이클 분류 유지
(3) **Boundary case 처리**: 사이클 + 지속성장 섞임 → Primary + Secondary 표기
(4) **SK하이닉스 대비**: 순수 메모리 (사이클 단독) vs 삼성전자 (사이클 + DX·SDC·Harman 안정 사업부 흡수)

### ④ 적정 밸류에이션 방법

- **PBR** (사이클 기준) 우선
- **PER** 보조 (지속성장 사업부 가치 반영)
- 사이클 정점 PBR 상한 vs 저점 PBR 하한 밴드 활용
- SK하이닉스 PBR 단독, 삼성전자 PBR + PER 혼합

### ⑤ 분기 재평가 트리거

- DS 부문 영업이익 비중이 DX·SDC·Harman 합산 이하로 하락 시 → 지속성장 재분류 검토
- 2개 분기 연속 OPM range가 5%pt 이내로 안정 시 → 사이클 → 지속성장 transition 후보

**DX (Device eXperience) 부문 — 매출 비중 56.3%**

"사람이 손에 들거나 집에서 쓰는 전자기기를 만드는 사업부."

- **모바일**: **Galaxy 시리즈**
    - Galaxy S 시리즈 (S25 / S25 Ultra / S25 Edge / S25+) — 플래그십
    - Galaxy Z 폴더블 (Z 폴드7 / Z 플립7 / Z TriFold 신규)
    - Galaxy A·M 시리즈 — 보급형
    - Galaxy Tab — 태블릿
    - Galaxy Watch / Galaxy Buds — 웨어러블·이어폰
    - **Galaxy XR** (2025 신규 XR/AR 헤드셋)
- **PC**: Galaxy Book 시리즈
- **네트워크**: 5G 기지국 장비 (Verizon, Vodafone, NTT 도코모 등 통신사 OEM)

**DS (Device Solutions) 부문 — 매출 비중 39.0%**

"PC·스마트폰·서버에 들어가는 반도체 부품을 만드는 사업부 (B2B)."

- **메모리**: **HBM3·HBM3E·HBM4** (AI 가속기용 고대역폭), **DDR5·LPDDR5** (서버·PC·모바일), **V-NAND·NVMe SSD** (스토리지)
- **System LSI**: Exynos (모바일 AP), ISOCELL (카메라 센서)

**SDC (삼성디스플레이) — 매출 비중 8.9%**

"스마트폰·태블릿·노트북·TV에 들어가는 OLED 화면 패널을 만드는 자회사 (B2B + Galaxy 공급)."

- **Dynamic AMOLED**: Galaxy 시리즈·Apple iPhone (메인 OLED 공급)
- **폴더블 OLED**: Galaxy Z·Huawei·Xiaomi·Honor 폴더블
- **QD-OLED TV 패널**: Samsung TV·Sony Bravia (프리미엄 TV)
- **Auto OLED**: 자동차 인포테인먼트 디스플레이

**Harman — 매출 비중 4.7%**

"자동차에 들어가는 인포테인먼트와 오디오를 만드는 미국 자회사."

- **Lifestyle Audio**: **JBL** (스피커·이어폰), **Harman Kardon**, **AKG** (헤드폰), **Mark Levinson**·**Lexicon**·**Revel** (하이엔드)
    - 2025 신규 인수: **Bowers & Wilkins** (영국 하이엔드), **Sound United** (Denon·Marantz·Polk·Definitive Technology 등)
- **자동차 전장 (B2B)**: 디지털 콕핏·인포테인먼트·텔레매틱스
    - 주요 OEM 고객: BMW, Mercedes-Benz, Audi, Volkswagen, Toyota, Hyundai, Kia, Stellantis 등
