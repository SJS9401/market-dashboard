## ① 기업 분류

(1) Primary / Secondary 분류

**Primary 분류: 사이클 (중공업·건설 mix, 8년 OPM range +11pp 강한 사이클성)**

→ 분할상장 후 8년 OPM 1.5%~12.5% (range +11pp, cutoff ±10pp 초과) — 한국 3사 중 가장 강한 사이클 진폭

→ 2018-2022 BEP 5년 구간 (OPM 1.5-4.1%) → 2023~ secular 진입 (사이클 1회 + 미국 변압기 sweet spot 가속)

**Secondary 노트: 지속성장 진입 (변압기 US sweet spot + HVDC 한국 단독)**

→ **HICO 미국 자회사 (Memphis)** = 미국 IOU 5개사 (Eversource·AEP·Dominion·Southern·Georgia Power) + Intersect/Pattern 신재생 직수주 → secular 가속

→ **HVDC 핵심 부품 (변압기·VI차단기·GIS) 한국 단독** = Hitachi Energy 글로벌 #1 다음 글로벌 4사 (Hitachi·GEV·ABB·Siemens) 외 한국 유일

**Entity 구조 (분할 후 mixed)**

→ **(1) 중공업 segment** — FY25 매출 41,493억 (69.5%) — 변압기·차단기·HVDC·전동기·풍력

→ **(2) 건설 segment** — FY25 매출 17,865억 (29.9%) — 진흥기업 자회사 (주상복합·아파트·재개발)

→ **(3) 공통·임대** — FY25 328억 (0.5%)

→ **(4) HICO 미국 자회사** — Memphis 변압기 신공장 (별도 reporting)

(3) 정량적 분류 근거

→ **글로벌 HVDC 점유율 강자** — 한국 3사 중 유일하게 HVDC 핵심 부품 보유 (HVDC 변압기·VI차단기·GIS)

→ **글로벌 매출 비중 약 40%** (FY25 연결 수출/내수 mix) — HD 77%·LS 60% 대비 낮으나 HICO 미국 자회사 통한 IOU 매출 강함

→ **사업부 다각화** — 한국 3사 중 **유일 건설 부문 보유** (진흥기업 자회사 — 주상복합·재개발). FY25 건설 매출 1.8조원 = mix 희석이나 자체 캐쉬카우

→ **단일 분기 사상 최대 매출 4Q25 17,000억원 (+20% YoY)** 연결 기준 — FY24 OP 3,625억 → FY25 OP 7,470억 (+106% YoY)

→ **연결 8년 시계열 사이클 패턴** — 2018-2022 BEP 구간 (OPM 1-4%) → 2023 secular 진입 (OPM 6%) → 2024-2025 가속 (7.4%→12.5%) = 한국 3사 중 가장 가파른 OP 성장

→ **사이클 진폭 +11pp (cutoff ±10pp 충족)** = 사이클 분류 확정, 단 2023~ secular trajectory 진입

(4) 산업 분류

→ **한국표준산업분류** — '전기변환장치 및 분배제어장치 제조업' + '건축물 건설업'

→ **KRX 업종** — 전기·전자 + 건설업 (mixed)

→ **FnGuide 섹터** — 산업재 > 전력장비

→ **Bloomberg Industry Classification** — Industrial — Electrical Components & Equipment

→ **워치리스트 섹터** — T1 전력 인프라

(5) 분류 결정 논리

(1) **가장 매출 큰 사업부 기준** — 중공업 69.5% (OP 90%+ 기여) > 건설 29.9% (OP mix 희석) → 중공업 사이클이 Primary driver

(2) **사이클 vs 지속성장 sub-rule** — 8년 OPM range +11pp (cutoff ±10pp 충족) + 사이클 회수 1회 (2018-2020 저점) → **사이클 분류**

(3) **Boundary case 처리** — 사이클 분류이나 2023~ secular 가속 (HICO Memphis ramp + 765kV US sweet spot) → Primary 사이클 + Secondary 지속성장 진입 표기

(4) **글로벌 피어 대비** — 효성 OPM 12.5% vs HD 24.4% (한국 1위, US sweet spot 우위) vs LS 8.6% (자동화 mix) vs HE 12.0% / ABB 19% (글로벌 멀티) → 효성은 한국 3사 OPM 2위 + HVDC 한국 단독 (글로벌 #4-5)

(6) 적정 밸류에이션 방법

→ **1차 — SOTP** (사이클 분류 + 건설 mix 기반): 중공업 (글로벌 피어 PER) + 건설 (낮은 PER) + HVDC 프리미엄 분리 평가

→ **2차 — Forward PER + P/B 밴드** (사이클 매핑): 한국 3사 중 건설부문 mix로 PER 적용 조심, P/B 사이클 band 활용

→ **3차 — EV/EBITDA**: 자회사 다수 + 건설 부문 영향으로 EBITDA가 OP보다 정확한 비교 척도

→ **4차 — 사이클 매핑**: GE Vernova·ABB와의 OPM 갭, FY25 12.5% → FY27 15%+ trajectory 확인

→ **단순 DCF 미사용 근거** — 사이클 변동성 + 건설 부문 lumpy로 forward FCF 변동 큼

(7) 분기 재평가 트리거

→ ① **HICO 미국 변압기 capa 추가 증설 + Memphis 가동 본격화** → 미국 secular 매출 확장 시그널

→ ② **OPM 정상화 trajectory** (FY25 12.5% → FY27 15%+) → 글로벌 피어 OPM 갭 축소

→ ③ **HVDC 글로벌 수주 추가** (Hitachi Energy의 6년치 백로그 대비 효성 점유율 확인)

→ ④ **M&A·증설 (capa expansion)** — 창원공장 capa 확대 + Memphis 2차 증설 + 인도 푸네 확장

→ ⑤ **셀사이드 컨센 추가 상향** (이미 1Q26 +33% 일제 상향 완료, 2차 추가 상향 trigger)

→ ⑥ **건설부문 OPM 회복** (1Q26 +111억 흑전, FY26 정상화 시 그룹 OPM 추가 +2-3pp 상승 여력)

- 조현준 회장 = 그룹 총수, ㈜효성 회장 겸직 (소유경영 직접 지배)
- 우태희 사장 = 정부 출신 (산업부 2차관), 정부·인허가 대응 라인
- 요코타 부사장 = 일본인 전력기기 전문가 (도시바 출신), 글로벌 변압기·HVDC 기술 라인
- 박남용 부사장 = 건설 부문 전담

**(3-2) 미등기 임원 (주요 부문장)**

→ **배용배** (부사장, 南通법인장) — 전 전력PU 국내영업·창원공장 부공장장
→ **박태영** (전무, 변압기사업 총괄 + 글로벌변압기영업 총괄) — 인도 푸네법인장 경력
→ **핫토리 마코토 (服部 誠)** (전무, 일본인, 전력PU 리스크관리·일본영업 — 미쓰비시 상사 출신)
→ **권기영** (전무, 차단기사업 총괄 + 글로벌차단기영업 + 유럽R&D센터장)
→ **연규찬** (전무, 그리드 솔루션 담당, 전 피츠버그법인장)
→ **윤종현** (전무, 기전PU장 — 삼성중공업 조선소장 출신)
→ **한상태** (전무, 건설PU 마케팅 담당)
→ **이창호** (전무, 재무실장 — 효성티앤씨 CFO 출신)
→ **이정원** (전무, 홍보)
→ **이민** (전무, 웰링턴사업단장 — 호스피탈리티)
→ **조현철** (상무, 피츠버그법인장 — **조현준 회장 동생**)

→ **외국인 임원 2명 (요코타·핫토리)**: 일본 전력기기·종합상사 출신 → 글로벌 기술·영업 라인
→ **정부 출신 1명 (우태희)**: 산업통상자원부 2차관 → 정부 인허가 대응
→ **그룹 일가 직접 경영**: 조현준 회장 + 조현철 (회장 동생) 상무
