(1) Primary / Secondary 분류

**Primary 분류: 지속성장 (Secular)**

→ **Energy Transition 메가트렌드 직접 수혜** — 전력망 T&D 인프라 글로벌 #1

→ 5년 연속 Revenue·Margin 단조 우상향 (downcycle 부재), Backlog 5-6년 visibility

**Secondary 노트: 턴어라운드 후반 + 일부 사이클 noise 잔존**

→ **턴어라운드 잔여** — 2020 ABB로부터 인수 직후 Adj EBITA 6.1% → FY25 12.0% (5년간 +590bp 우상향, 2030 Ambition 16-20%로 추가 확장 여지)

→ **사이클 noise** — 원자재 (구리·알루미늄·강판), 환율 (¥/USD/EUR), heavy industry capex 사이클 일부 노출 — 단 Backlog buffer로 평활화

**Entity 구조 (3-axis)**

→ **(1) Power Grids segment of Hitachi Ltd** — FY25 ¥3,219.9 bn = $19.8B (그룹 매출 30%)

→ **(2) Hitachi Energy 본체** — Zürich HQ, 51,253명, 100% Hitachi 보유 (비상장 글로벌 본체)

→ **(3) Hitachi Energy India** — NSE POWERINDIA, 75.43% 지분, IPO 분리 상장

(3) 정량적 분류 근거

|------|-----|

→ **단조 우상향 (5년 연속 Revenue·Margin 동시 상승)** = 사이클 분류 조건 미충족
→ **턴어라운드 + 지속성장 혼재** = 인수 직후 (FY21) 정상화 phase + 이후 Energy Transition secular

→ **글로벌 T&D #1 시장점유율** — HVDC·Power Transformers·GIS 전 영역 World #1, 140+개국 installed base 500,000+ assets ($230B)

→ **HVDC 압도적 우위** — World's first commercial HVDC (1954, ASEA lineage), first multi-terminal HVDC (2022), Bhadla-Fatehpur HVDC India 대형 win (Q1FY26 INR 11,339 crore orders, +365% YoY)

→ Adj EBITA Target 8-12% → **Actual 11.1%** (상단 도달)

→ ROIC Target 15% → **Actual 25%** (1.7배)

**2030 Ambition** (CFO IR Day)

→ Revenue **$33B+** (CAGR 13-15%) + Adj EBITA **16-20%** + ROIC **25-30%**

→ **FY25 Backlog $57.9B (+33% YoY)** = 매출 ~3년치 → 5-6년 visibility 확보 (지속성장 분류 핵심 근거)

→ **$9B 투자 (2024-2030)** — capacity 확장 (Dry Capacitors 4x, Valves 2.5x, HVDC Transformers 2.5x) + 15,000명 신규 채용 (through 2027)

(5) 분류 결정 논리

(1) **가장 매출 큰 사업부 기준** 적용 시 Hitachi Ltd 5 sector 중 **Energy가 매출 30% (3위, DSS·CI 다음)이나 Adj EBITA 32% (1위)** — Energy가 그룹 가치 driver

(2) **사이클 vs 지속성장 sub-rule 적용**:
   - 5년 Margin range +5.9%pt (cutoff ±10%pt 미달)
   - downcycle 0회 (단조 우상향)
   - Backlog $57.9B = 매출 ~3년치 visibility
   → **지속성장 분류 유지**

(3) **Boundary case 처리**: 턴어라운드 잔여 (FY21 6.1% → FY25 12.0%) + 일부 사이클 noise (원자재·환율) → Primary + Secondary 표기

(4) **글로벌 피어 대비**:
   - **ABB** (Margin 우위 19%, 4 segment 분산) vs HE (Backlog·Scale 우위)
   - **GE Vernova** (분사 + Wind 적자, 8.3% margin) vs HE (안정 secular)
   - **Schneider** (EM+IA 멀티, 18.7% margin) vs HE (Pure-play 전력망)
   - **한국 3사** (HD현대·효성·LS) vs HE (글로벌 규모 6-9배 더 큼)

(6) 적정 밸류에이션 방법

→ **1차 — Forward PER 또는 EV/EBITDA** (지속성장 기준): Hitachi Ltd 모회사 가치는 그룹 가치 합산, HE segment는 EV/EBITDA Multiple 평가

→ **2차 — Sum-of-the-Parts (SOTP)**: Hitachi Ltd = DSS + Energy + Mobility + CI segment별 multiple 분해

→ **3차 — Backlog 기반 Forward Revenue Multiple**: Backlog $57.9B + 신규 orders 연 $35B+ → Forward Revenue × Multiple

→ **PBR 미사용 근거** — 사이클 분류 미해당, downcycle 부재로 P/B band 의미 없음

→ **글로벌 피어 multiple 갭** — HE (Hitachi 그룹 multiple)는 ABB (Pure-play premium) 대비 conglomerate discount 적용 ↔ 단 Energy segment의 성장률·Backlog로 discount 축소 진행 중

(7) 분기 재평가 트리거

→ ① **Adj EBITA Margin 16% 도달 시** (2030 Ambition 하단) → secular re-rating + 글로벌 피어 (ABB) 갭 축소

→ ② **Backlog $70B 돌파 시** (Q1FY26 in 8.8 tn yen, Q4FY26-Q1FY27 가능성) → forward visibility 4년+ 확장

→ ③ **HVDC orders ±50% 변동 시** (Bhadla-Fatehpur 같은 mega project 위주) — 단일 분기 lumpy

→ ④ **모회사 Hitachi Ltd capital allocation 변동** — HE IPO 시그널·Energy spin-off 검토 (현재 비상장 유지 방침이나 conglomerate discount 해소 옵션)

→ ⑤ **인도 자회사 POWERINDIA 분기 Orders ±100% 변동** — HVDC 대형 lumpy 패턴

→ ⑥ **Service & Digital revenue 비중 20% 도달 시** (현재 ~10%) — recurring revenue 모델 전환 가속 → secular pure-play 재평가

## ③ 비즈니스 모델

(1) Value Chain & Revenue Mix

**Products + Systems + Services & Software 3 layer 모델** (CFO IR Day Oct 2025)

- **Products** — short lead time (Year 1), 표준화된 변압기·차단기 등
- **Systems** — medium lead time (Year 2-3), HVDC·FACTS 대형 turnkey
- **Services & Software** — long-tail recurring (Year 4-6), 가장 높은 마진

→ Lead time from order to revenue: **1-6년** (Backlog $57.9B에 ~3년치 revenue 잠금)

**Order Backlog Quality 개선** (CFO IR Day)

- FY21 vs H1 2025: Backlog 1.5x (10→14 in 단위), **Gross Margin 50% 개선** (backlog 내 평균)
- Frame Agreement (FA) & Capacity Reservation Agreement (CRA): 비중 확대 → 위험 감소
- EP/EP+ (Engineering & Procurement, EPC 제외 construction) 비중 확대

(2) 사업부별 개요 (매출 비중 큰 순서, 직관적 설명)

**Transformers BU — 매출 비중 ~30%**

> "전력망의 '변압' 역할을 하는 거대한 전력 변압기를 만드는 사업부. 발전소·송전·배전 전 영역을 커버하는 HE의 최대 매출원."

- **Power Transformers (대형 전력 변압기)** — 송전 grid의 핵심. 100MVA~1,000MVA+, 765kV·800kV·1,100kV 초고압. 데이터센터·재생에너지·HVDC link 등 모든 그리드 인프라의 필수품. **글로벌 #1 점유율 (약 20%)**
- **Distribution Transformers (배전 변압기)** — 도시·산업 단지 배전 grid용. 5MVA~63MVA. EconiQ™ 친환경 시리즈 (식물성 절연유)
- **HVDC Transformers** — 초고압 직류 송전용 특수 변압기 (HVDC 시스템 핵심 component). Bhadla-Fatehpur HVDC India 등 대형 프로젝트 공급
- **Dry-Type Transformers** — 액체 절연유 없는 친환경 변압기 (실내·지하·해상풍력 등 화재 위험 지역)
- **Traction Transformers** — 철도 전철화 전용 (모회사 Hitachi Mobility 시너지)
- **TXpand™** — 폭발·화재 저항성 강화 친환경 변압기 시리즈 (출시 후 핵심 차별화 product)

**High Voltage Products (HVP) BU — 매출 비중 ~22%**

> "전력망의 '스위치·차단기·보호장치'를 만드는 사업부. 사고·고장 발생 시 grid를 보호하고 차단하는 critical safety 제품군."

- **GIS (Gas Insulated Switchgear, 가스절연 개폐장치)** — 765kV·1,100kV 초고압 변전소 핵심. SF₆ 가스 절연 + 컴팩트 설계. **글로벌 #1**
- **AIS (Air Insulated Switchgear)** — 옥외 변전소용 공기절연 개폐장치
- **Circuit Breakers (차단기)** — 단락 사고 시 grid 차단. Live Tank·Dead Tank·Generator Breakers
- **EconiQ™ SF₆-Free Switchgear** — **420kV SF₆-free GIS (세계 최초)** — F가스 규제(EU F-gas) 강화 → CAGR 5x 성장
- **Surge Arresters (피뢰기)** — 낙뢰·서지 보호
- **Capacitors (커패시터)** — 무효전력 보상. Dry Capacitor (HVDC 핵심) 2024-2030 capacity 4x 확장
- **Instrument Transformers (계기용 변성기)** — 전압·전류 측정
- **Bushings (부싱)** — 변압기·차단기 외부 인입 절연
- **Semiconductors (반도체 — Power Semiconductor)** — IGBT·Thyristor 등 HVDC valve 핵심 반도체. 2024-2030 capacity 2x 확장
- **Wallbox EV Chargers** — EV 충전 인프라 (신규 segment)

**Grid Integration BU — 매출 비중 ~22%**

> "전력망의 '대형 송전·연결 시스템'을 turnkey로 설계·제작·설치하는 사업부. HE의 대형 프로젝트·HVDC 본진."

- **HVDC (High Voltage Direct Current) Systems** — 초장거리·해저 송전 / 비동기 grid 연결 / 해상풍력 연계. **세계 최초 상업용 HVDC (1954, Gotland)**, **세계 최초 multi-terminal HVDC (2022, Caithness-Moray-Shetland UK)**. 글로벌 압도적 #1.
    - LCC HVDC (Line Commutated Converter): 전통 thyristor 방식, 초장거리 대용량
    - **VSC HVDC (Voltage Source Converter, HVDC Light®)**: 신규 modular IGBT 방식, 해상풍력 핵심
    - Bhadla-Fatehpur HVDC India (2025.07 Q1FY26 INR 11,339 cr 대형 win)

- **Substations (변전소 통합 turnkey)** — Air/Gas Insulated, Conventional/Digital Substations
- **Grid Edge Solutions** — 마이크로그리드·BESS (배터리 에너지저장장치) 연계 시스템, Off-grid·Hybrid 솔루션

- **Service Hub for HVDC** — HVDC 운영 후 service contracts (long-tail 수익원)

**Grid Automation BU — 매출 비중 ~16%**
