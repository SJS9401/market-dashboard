/*print 기능 추가 2021-03-16*/
function printDoc(idx) {
	var printFrame;
	printFrame = document.getElementById('naviIfrm_'+idx);
	
	var agent = navigator.userAgent.toLowerCase();
	// * 참고: iframe쪽으로 포커스를 꼭 줘야 iframe내용만 출력할 수 있다.
	if(agent.indexOf('trident') > -1){  // 익스플로러경우 iframe id를 바로 불려야 포커스 됨
		if(idx==1){
			naviIfrm_1.focus();
		}else if(idx==2){
			naviIfrm_2.focus();
		}else if(idx==3){
			naviIfrm_3.focus();
		}else if(idx==4){
			naviIfrm_4.focus();
		}else{
			naviIfrm_5.focus();
		}
	}else{
		printFrame.focus(); // 그 외는 iframe id로 객체찾아서 포커스 줌
	}
	printFrame.contentWindow.print();
}

function changeTab(num) {
	if ($j("#naviIfrm_"+num).attr("src") == "") {
		$j("#naviIfrm_"+num).attr("src", $j("#url_"+num).val());
	}
	
	$j("div[id^=contents_]").hide();
	$j("#contents_"+num).show();
	$j("div[id^=btnViewer_]").hide();
	$j("#btnViewer_"+num).show();
	$j("li[id^=naviTab_]").removeClass("on");
	$j("#naviTab_"+num).addClass("on");
}

<script type="text/javascript">
function openReportViewerEng(rcpNo, dcmNo){
	var url = "/dsbh001/main.do?rcpNo=" + rcpNo;
	if (dcmNo) {
		//<![CDATA[
		url += "&dcmNo=" + dcmNo;
		//]]>
	}

	var size = getOpenSize(1024, 768);
	window.open(url, rcpNo, size+",resizable=yes");
	$j("#r_"+rcpNo).css("color","#cd0093");
}

var win_num = 1;
function openReportViewer(rcpNo, dcmNo){
	var url = "/dsaf001/main.do?rcpNo=" + rcpNo;
	if (dcmNo) {
		//<![CDATA[
		url += "&dcmNo=" + dcmNo;
		//]]>
	}

	var size = getOpenSize(1200, 810);
	window.open(url, rcpNo+win_num, size+",resizable=yes");
	win_num++;
	if (dcmNo) {
		$j("#r_"+rcpNo+dcmNo).css("color","#cd0093");
	}else{
		$j("#r_"+rcpNo).css("color","#cd0093");
	}
}

function openReportViewerParam(rcpNo, dcmNo, params){
	var url = "/dsaf001/main.do?rcpNo=" + rcpNo;
	if (dcmNo) {
		//<![CDATA[
		url += "&dcmNo=" + dcmNo;
		//]]>
	}
	if (params) {
		//<![CDATA[
		url += params;
		//]]>
	}

	var size = getOpenSize(1200, 810);
	window.open(url, rcpNo+win_num, size+",resizable=yes");
	win_num++;
	if (dcmNo) {
		$j("#r_"+rcpNo+dcmNo).css("color","#cd0093");
	}else{
		$j("#r_"+rcpNo).css("color","#cd0093");
	}
}

function openReportListViewer(rcpNo, dcmNo, eleId){

	var url = "/dsaf001/main.do?rcpNo=" + rcpNo;
	if (dcmNo) {
		//<![CDATA[
		url += "&dcmNo=" + dcmNo;

		}
	}

	var size = getOpenSize(1200, 810);
	window.open(url, rcpNo+win_num, size+",resizable=yes");
	win_num++;
	if (dcmNo) {
		$j("#r_"+rcpNo+dcmNo).css("color","#cd0093");
	}else{
		$j("#r_"+rcpNo).css("color","#cd0093");
	}
}

/*
 * 통합검색용 문서뷰어 팝업 호출
 * nrseo 2010. 10. 20
 * 2016.09.30 jsp에 직접 명시 하여 미사용(DSAB007A.jsp)
 * - a:visited 미작동으로 인한 조치
 */
function openReportViewerKeyword(rcpNo, dcmNo, keyword){
	var url = "/dsaf001/main.do?rcpNo=" + rcpNo;
	if (dcmNo) {
		//<![CDATA[
		url += "&dcmNo=" + dcmNo;
		//]]>
	}
	//<![CDATA[
	url += "&keyword=" + encodeURIComponent(keyword);
	//]]>

	var size = getOpenSize(1024, 768);
	window.open(url, rcpNo+win_num, size+",resizable=yes");
	win_num++;
	if (dcmNo) {
		$j("#r_"+rcpNo+dcmNo).css("color","#cd0093");
	}else{
		$j("#r_"+rcpNo).css("color","#cd0093");
	}
}

/*

function openXbrlViewer(rcpNo, dcmNo, lang){
	var url = "";
	if (lang == "en") url = "https://englishdart.fss.or.kr/dsbh002/main.do?rcpNo=" + rcpNo;
	else url = "/dsaf002/main.do?rcpNo=" + rcpNo;
	
	if (dcmNo) {
		//<![CDATA[
		url += "&dcmNo=" + dcmNo;
		//]]>
	}

	var size = getOpenSize(1200, 810);
	window.open(url, "_blank", size+",resizable=yes");
}

/*
 * 사용(xbrl뷰어 열기 팝업(opendart link))
 */
function openXbrlViewerNew(opendartUrl, rcpNo, stat, preview) {
	if (stat == "Y") {
		var url = opendartUrl + "/xbrl/viewer/main.do?rcpNo=" + rcpNo;

		var size = getOpenSize(1200, 810);
		window.open( url, rcpNo+win_num, size+",resizable=yes" );
		win_num++;
	} else if (stat == "N") {
		if (preview == "Y") {
			openXbrlViewer(rcpNo, "", "");
		} else {
			alert( '문서 생성중 입니다.\n잠시 후 다시 조회 하시기 바랍니다.' );
		}
	} else {
		alert( '생성된 문서가 없습니다.' );
	}
}
