# SanDisk Q4 FY26 팔로업 리포트 — "사이클성 제거" NBM 인플렉션 검증

## 1. Q3 FY26 실적 — 사상 최대 폭증 + NBM 사이클 종식 선언

매출 $5.95B (+251% YoY, +97% QoQ) record. Non-GAAP GPM **78.4%** (가이던스 65-67% 대비 +11~13pp 비트). Non-GAAP EPS $23.41 (vs 컨센 $11.50, 2배 비트). Datacenter +233% QoQ ($1.47B), Edge +118% QoQ ($3.16B).

**NBM (New Business Model) 메가 계약**: 5건 multiyear (Q3 3건 + Q4 2건), 최소 매출 **$42B** + financial guarantees **$11B+** + $400M prepayment. FY27 bit supply 1/3+ contracted, CEO 목표 50%+. **부채 zero + $3.7B cash + $6B 자사주 매입 announce**.

**CEO David Goeckeler 결정 발언**: "**We are very focused on getting the cyclicality out of this business**" — NAND 산업 valuation framework 변화 트리거.

**핵심 한 줄**: NVIDIA ICMS G3.5 NAND SSD tier + 에이전트 AI KV cache 폭증 + NBM 사이클 종식 = SNDK valuation 모델 전면 재구성. 평균 TP $135 → $1,350 (+900%), Strong Buy 4 → 10사.

## 3. Q3 FY26 핵심 변화 — 3개 카테고리

**(1) 산업/사이클 변화 — NAND 사이클 종식 시도 + 에이전트 AI 스토리지 인플렉션**

NVIDIA ICMS (Inference Context Memory Storage) tier G3.5 신규 채택 (CES 2026 + GTC 2026). KV cache가 100K → 100M tokens (1000배 확대)로 SSD가 GPU HBM과 일반 storage 사이 신규 메모리 tier로 채택됨. SNDK Enterprise SSD가 portfolio 25% 차지 (이전 ~15%), QLC Stargate Q4 ramp 시작. NBM 5건 $42B backlog가 NAND 사이클 변동성 제거 시도 — Goeckeler "사이클성 제거" 선언이 valuation framework 재구성 트리거.

**(2) 사업부 mix 변화 — Datacenter 비중 폭증**

Q2 → Q3 Datacenter $440M → $1.47B (+233% QoQ), Edge $1.45B → $3.16B (+118% QoQ), Consumer $912M → $820M (-10%, seasonality). Enterprise SSD가 portfolio 25%로 확대 — QLC Stargate Q4 ramp 시 30%+ 예상. TLC 비중 2/3 vs QLC 1/3 (Data center는 predominantly TLC). NBM의 fixed + variable pricing = downside protection + upside capture 양면.

**(3) Narrative/Multiple 변화 — 사이클 산업 valuation framework 전면 재구성**

평균 TP $135 → $1,350 (+900%) 사상 최대 폭 상향. Strong Buy 등급 4 → 10사. Morgan Stanley·Goldman·Bernstein 3사 시각 전환 (Bear → Bull). 공통 논리: "NBM = NAND 사이클 산업의 valuation framework 변화". 주가 2026 YTD **+509%** (단일 종목 최대 폭등), Q3 발표 후 단기 pullback $1,382. FY26 매출 컨센 $10.5B → $20.3B (+93%), EPS $18 → $48 (+167%).

## 4. Q4 FY26 핵심 팔로업 사항 (다음 발표 2026-08-13 예정)

**(1) Q4 매출 $8B + GPM 80% 가이던스 달성 — 1순위**

회사 가이던스 mid $8.0B (+34% QoQ, +327% YoY). 컨센 +23% above. 달성 시 슈퍼사이클 모멘텀 검증 + NBM 가격 메커니즘 작동 증명. 미달 시 가격 약화 신호.
*주간 모니터링: NAND spot price (DRAMeXchange), TrendForce/IDC NAND 가격 indices, 삼성전자·SK하이닉스 NAND 부문 가이던스. 뉴스 키워드: "NAND ASP", "enterprise SSD pricing".*

**(2) QLC Stargate Q4 첫 매출 ramp**

CEO 1년+ qualification 언급, Q4 시작 약속. 매출 기여 비중 + ASP + major player 명단 announce 모니터링.
*뉴스 키워드: "SanDisk Stargate QLC", "QLC enterprise SSD shipment", "BiCS 8 QLC".*

**(3) NBM 추가 계약 announce (Q4 2건 + 향후)**

Q4 2건 추가 진행 중 (Goeckeler 명시). FY27 bit supply 50%+ contracted 목표 진척 모니터링. RPO metric quarterly disclose.
*뉴스 키워드: "SanDisk NBM contract", "multi-year supply agreement", "SanDisk RPO".*

**(4) NVIDIA ICMS G3.5 채택 + SNDK preferred supplier**

NVDA Q1 FY27 발표 (2026-05-20, 내일) 시 Rubin + BlueField-4 ICMS 디테일 announce 가능성. SNDK가 ICMS preferred supplier로 채택될 시 폭발적 수요. STX (Solidigm 인수 후 SK하이닉스 계열)과 ICMS 점유율 경쟁.
*뉴스 키워드: "NVIDIA ICMS supplier", "Rubin platform NAND", "BlueField-4 SSD partnership".*

**(5) Datacenter 매출 분기 $2B+ 도달 — KV cache 인플렉션 검증**

Q3 $1.467B → Q4 + QLC Stargate ramp = $2B 가능. annualized $8B run rate 진입 시 multi-billion 추가 NBM 가능성. 시리즈 매트릭스 (STX·WDC와 비교)에서 SNDK 차별 위치 검증.
*뉴스 키워드: "SanDisk Datacenter revenue", "Enterprise SSD ramp 2026".*

## 5. 스토리지 3사 시리즈 — SNDK 첫 번째

본 팔로업은 **SNDK·STX·WDC 스토리지 3사 시리즈 분석**의 첫 번째 종목. 다음:
- **[실적 리뷰 모드] STX (Seagate)** — Mozaic HAMR ramp, Mass Capacity AI cold storage, 5 CSP qualified
- **[실적 리뷰 모드] WDC (Western Digital)** — SNDK 분사 후 HDD pureplay, Cloud 8 CSP 노출

STX·WDC도 NBM-like 계약 시도 시그널 모니터링 — SNDK 모델이 storage 산업 전체로 확산될 가능성.

**SNDK 차별점 (3사 종합)**:
- SNDK: NAND/SSD pureplay + **NBM $42B backlog** + KV cache (G3.5 tier)
- STX: HDD pureplay + Mozaic HAMR + Mass Capacity (cold storage)
