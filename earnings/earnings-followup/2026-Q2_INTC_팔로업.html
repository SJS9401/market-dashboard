# Intel 2Q26 팔로업 리포트 — 에이전트 AI CPU 병목 narrative 검증 모니터링

## 1. Q1 2026 실적 — 6분기 연속 컨센 비트, 주가 +24% 폭등

매출 $13.58B (+7.2% YoY, $1.4B above outlook), Non-GAAP EPS $0.29 (vs 컨센 $0.01, **29배 비트**). DCAI 매출 record $5.1B (+22% YoY), OM 30.5% (역대 최고). Intel Foundry $5.4B (+16%), ASIC run rate $1B+/year 도달. **AI 관련 매출 60% ($8.1B, +40% YoY)**.

CEO Lip-Bu Tan 채택 narrative: "Intel CPUs Foundational to Inference and Agentic". CFO Zinsner 결정적 quote: "Training **7-8 GPU : 1 CPU** → Inference **3-4:1** → **Agentic potentially flipping the other direction**". 1987년 이후 최대 단일일 주가 +24%, 4월 한 달 **+90%**. 12+ 증권사 PT 상향 ($21 → $31 평균).

**핵심 한 줄**: "trend, not noise" — Lip-Bu Tan turnaround story 정착, 에이전트 AI CPU 병목 narrative의 Intel 공식 채택 + Google LTA 3-5년 신규 계약 + ASIC 사업 본격화

## 2. 지난 분기 (Q4 2025) 핵심 팔로업 사항

## 3. Q1 2026 핵심 변화 — 3개 카테고리

**(1) 산업/사이클 변화 — 에이전트 AI CPU 병목 narrative 채택**

훈련 (Training) 시기 GPU 1개당 CPU 1/8개 비율이 추론 (Inference) 1/3개 → 에이전트 (Agentic) 1:1+로 역전. Intel·AMD·ARM 모두 수혜 포지셔닝. INTC가 가장 큰 점유율 (x86 데이터센터 70%+) + Foundry 자체 양산 + Advanced Packaging 통합 보유. CPU 단가는 GPU 1/10 수준이지만 출하량 폭증으로 매출 절대액 회복.

**(2) 사업부 mix 변화 — DCAI vs CCG 역전 시그널**

DCAI OM 13.9% (Q1'25) → 30.5% (Q1'26) **+16.6pp 폭증**. CCG OM 26.1% → 27.0% 정체. ASIC revenue "nearly doubled YoY" + run rate $1B+/year. Foundry IFS는 OM -71.7% 악화 (restructuring $4.1B 일회성 + 18A·14A 본격 ramp 비용). AI 관련 매출 비중 60% (Q1, $8.1B), +40% YoY — Intel은 더 이상 PC CPU 회사가 아닌 AI 인프라 CPU 회사로 narrative 전환.

**(3) Narrative/Multiple 변화 — Bear→Bull 시각 전환**

Goldman Sachs Sell→Neutral, Citi Neutral→Buy, Bernstein Underperform→Market Perform 3사가 가장 큰 시각 전환. 공통: "DCAI 5분기 만에 13.9% → 30.5% OM = trend, not noise". 평균 TP $21 → $31 (+48%). Strong Buy 등급 증권사 2 → 6. 4월 한 달 주가 **+90% 폭등**, 1987년 이후 최대 단일일 +24%. 'Lip-Bu Tan turnaround story' 정착 시그널.

## 4. Q2 2026 핵심 팔로업 사항

**(1) DCAI 매출 $5.5B+ 가시화 여부 — 1순위**

Q1'26 $5.1B + Q2'26 회사가이던스 "Double-digit YoY growth expected to continue" 약속. 컨센 Q2'26 DCAI $5.5B (+30% YoY). 미달 시 모멘텀 둔화 신호. 30%+ 비트 시 secular 시각 강화.
*주간 모니터링: AWS·MSFT·META·GOOGL·ORCL Q2 CapEx 가이던스 (5월 발표). 뉴스 키워드: "Granite Rapids ramp", "Sierra Forest", "Clearwater Forest".*

**(2) ASIC 사업 디테일 공개 — 분기당 매출 + 고객 수**

Q1 "nearly doubled YoY" + run rate $1B+/year 표명. 핵심 고객 (Google LTA 공개됨, Apple·Qualcomm·MediaTek 등 시그널 모니터링). Broadcom·Marvell 경쟁사 대비 점유율 변화 추적.
*뉴스 키워드: "Intel Foundry customer", "Intel ASIC win", "TeraFab partnership".*

**(3) Foundry IFS Operating Loss 안정화 — 일회성 $4.1B 제외 후 평상시 추세**

Q1'26 OM -71.7% (역대 최악, restructuring 일회성 영향). Q2'26 일회성 제외 평상시 -50% 수준 회복 expected. 18A yield 80%+ 안착 + 14A yield 진척 시그널. 외부 ASIC 수주 1건 이상 announce 여부 (특히 TeraFab 가능성 — 컨콜에서 언급).
*뉴스 키워드: "Intel 18A yield", "Intel 14A PDK", "Intel external customer".*

**(4) PC TAM 2H 둔화 시나리오 — CFO Warning 검증**

CFO Zinsner 명시: "Full-year PC TAM down low double-digit percent (~-10~-15%)". 메모리·웨이퍼·기판 공급 제약 + 가격 상승. CCG OM Q1 27.0% → Q2 회복 30%+ 가시화 여부 vs H2 둔화 시그널 강도.
*주간 모니터링: Dell·HP·Lenovo PC 출하 데이터, 메모리 ASP 추세 (SK하이닉스·마이크론 어닝콜).*

**(5) AMD·ARM 경쟁 — x86 vs ARM 데이터센터 점유율**

AMD EPYC Turin (Zen 5) Q2'26 출하 ramp — Intel Xeon 6 직접 경쟁. ARM 자체 칩 (Graviton5·MS Cobalt·Google Axion) 채택 확대 시그널. ARM AGI CPU 136 cores @ 300W vs Intel/AMD 128 cores @ 500W 전력 효율 비교 — 하이퍼스케일러 자체 칩 점유율 25%+ 진입 시 INTC 수혜 약화.
*뉴스 키워드: "AMD EPYC Turin", "ARM Neoverse", "Graviton5", "MS Cobalt", "Axion".*
