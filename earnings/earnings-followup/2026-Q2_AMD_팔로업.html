# AMD 2Q26 팔로업 리포트 — Server CPU TAM 2배 상향 narrative 검증

## 1. Q1 2026 실적 — TAM 2배 상향이 narrative game-changer

매출 $10.25B (+38% YoY), Non-GAAP EPS $1.37 (+43% YoY, +8% beat). Data Center record $5.78B (+57% YoY, +7% QoQ), OM 28%. Turin (Zen 5) **Q1 server revenue 50%+ crossover**.

**핵심 narrative — Lisa Su 직접**: "**Server CPU TAM $60B → $120B by 2030 2배 상향, CAGR +18% → +35%**" — 6개월 만에 TAM 2배. INTC CFO Zinsner의 "CPU:GPU ratio flipping" quote의 정량 검증.

**Meta + OpenAI 메가딜**: Meta 6 GW Instinct GPU deployment (1 GW custom MI450 initial) + 6세대 EPYC Venice lead customer. OpenAI engagement. AMD 2027 Data Center AI 매출 "tens of billions" 가시화.

**핵심 한 줄**: "Agentic AI Supercycle Biggest Winner" narrative 정착, 평균 TP $152 → $268 (+76%) 폭등, Strong Buy 14사 진입.

## 3. Q1 2026 핵심 변화 — 3개 카테고리

**(1) 산업/사이클 변화 — Server CPU TAM 2배 상향이 narrative 변곡점**

AMD가 2025-11 Financial Analyst Day에서 제시한 server CPU TAM $60B by 2030이 **6개월 만에 $120B로 2배 상향**. CAGR +18% → +35%. Lisa Su 3 카테고리 분류: (1) Traditional 일반 CPU (low double-digit), (2) AI head node CPU, (3) **Agentic AI CPU — TAM 증가의 largest portion**. "에이전트가 CPU에서 orchestration·data processing·기타 task 수행" → CPU 절대 출하량 폭증.

**(2) 사업부 mix 변화 — Data Center 비중 56.3% (Q1'25 49.4% +6.9pp)**

Data Center $5.78B (+57% YoY) — server CPU sales +50%+, EPYC Cloud Instances 1,600+ (+50% YoY). Turin Q1 매출 50%+ crossover (Zen 5 ramp 예상보다 빠름). Client & Gaming $3.6B (+23%, Client 26%+ Gaming 17%+). Embedded $0.87B (+6%) — 회복 시작. Q2 가이던스 server CPU **+70% YoY** 약속.

**(3) Narrative/Multiple 변화 — Goldman/Bernstein 시각 전환**

Goldman Sachs Neutral → Buy ($140 → $270), Bernstein Market Perform → Outperform ($130 → $260) 가장 큰 시각 전환. Strong Buy 등급 8 → 14사 진입. 평균 TP +76% 상향 ($152 → $268). "Server CPU TAM 2배 + Meta 6 GW = TAM 인플렉션 정량 검증" 공통 논리. Helios + MI450 Q3 ramp 시각화로 FY27 매출 $65B+ 가시화.
