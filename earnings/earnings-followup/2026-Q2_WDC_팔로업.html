# Western Digital Q4 FY26 팔로업 리포트 — EPMR 40TB ramp + HAMR qualification 진척 모니터링

## 1. Q3 FY26 실적 — STX 매출 추월 + 자본 구조 정상화

매출 $3.34B (+45% YoY), GAAP GPM **50.2%** (HDD pureplay 최초 50%+, 4분기 평균 +260bps 개선). Non-GAAP EPS $2.72. **Cloud HDD 89% 비중** $3.0B (+48% YoY), 222 EB (+34% YoY), **가격 +9% YoY** (LTA 효과), Cost per exabyte -10% YoY.

**자본 구조 정상화**: SanDisk 5.8M shares monetize → **$3.1B debt 상환**, Convertible $1.6B 잔여, Cash $2.0B, **Net positive cash $450M**. **S&P + Fitch investment-grade upgrade** ⭐. 배당 +20% 인상 ($0.15/share), Q3 자사주 $752M.

**CEO Irving Tan 에이전트 AI quote**: "**Agentic AI will drive step-function increase in capacity-oriented storage demand**" — 3 drivers (Cloud/Enterprise capacity / inference 새 데이터 / physical AI 합성 데이터). **>25% CAGR exabyte 성장** 가이던스 (STX +20%+ 대비 더 적극적).

**핵심 한 줄**: **WDC가 STX 매출 추월 ($3.34B vs $3.11B)** + investment-grade upgrade + EPMR 40TB H2 cal 2026 ramp + HAMR 4 customer qualification ahead of schedule + UltraSMR 60% by FY27 end + LTA through 2029. 평균 TP $125 → $195 (+56%), Strong Buy 4 → 8사, Sell 등급 0 (모두 제거).

## 3. Q3 FY26 핵심 변화 — 3개 카테고리

**(1) 산업/사이클 변화 — 에이전트 AI step-function + 자본 구조 게임 체인저**

CEO Tan: "Agentic AI = step-function increase capacity storage demand" — STX Mosley의 "huge benefit" quote보다 더 강한 narrative. 3 drivers 분류 (Cloud/Enterprise / inference 새 데이터 / physical AI 합성 데이터) = WDC만의 체계화. >25% CAGR exabyte 가이던스 (STX +20%+ 대비 적극적). SanDisk 5.8M monetize → $3.1B debt 상환 → S&P + Fitch investment-grade upgrade = HDD pureplay 첫 investment-grade.

**(2) 사업부 mix 변화 — Cloud 비중 89%로 집중 + 가격 폭증**

Cloud (HDD) $3.0B (89% 비중), +48% YoY. 222 EB (+34% YoY), 가격/TB +25% YoY ($10.8 → $13.5). EPMR 4.1M drives shipped at 32TB cap. **UltraSMR 3 largest CSP 채택, 두 곳은 거의 100% UltraSMR** — FY27 end 60% of exabytes 목표. HAMR 4 customer qualification (ahead of schedule), 2027 ramp 본격화. EPMR 40TB 3 customer qualification (H2 cal 2026 volume).

**(3) Narrative/Multiple 변화 — STX 매출 추월 + 자본 정책 정상화**

WDC 매출 $3.34B vs STX $3.11B로 **HDD 2위 WDC가 1위 STX 추월** (같은 날 발표). 평균 TP $125 → $195 (+56%), Strong Buy 4 → 8사 진입, Sell 등급 0. Morgan Stanley/Goldman/Bernstein 시각 전환. 공통 논리: "Investment-grade upgrade + dual-track HAMR/EPMR + step-function agentic AI = STX보다 더 빠른 정상화". GAAP GPM 50%+ + LTA 2029 + 배당 +20% = 자본 정책 게임 체인저.

## 4. Q4 FY26 핵심 팔로업 사항 (다음 발표 2026-08-05 예정)

**(1) Q4 매출 $3.80B + Cloud 90%+ 달성 — 1순위**

*뉴스 키워드: "WDC HAMR qualification", "Western Digital HAMR 44TB", "WDC HAMR customer adoption".*

**(4) UltraSMR 60% 진척 (FY27 end 목표)**

3 largest CSP 채택 (두 곳 100% UltraSMR) → 모든 major customers FY27 까지 qualification 목표. JBOD platform tier-2 CSP (Asia) 확장 시그널. 60% by end FY27 = 분기당 10pp 진척 필요.
*뉴스 키워드: "UltraSMR adoption", "Western Digital tier-2 CSP", "UltraSMR JBOD".*

**(5) SanDisk 잔여 1.7M shares monetize (FY26 내, tax-free)**
