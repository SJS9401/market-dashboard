<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, 'Pretendard', 'Segoe UI', sans-serif; overflow-x: hidden; }
  .tab-bar { display: flex; gap: 0; background: #010409; border-bottom: 1px solid #21262d; padding: 0 24px; }
  .tab-bar a { display: inline-block; padding: 8px 18px; font-size: 13px; font-weight: 600; color: #8b949e; text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab-bar a:hover { color: #f0f6fc; }
  .tab-bar a.active { color: #f0f6fc; border-bottom-color: #1f6feb; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 24px; border-bottom: 1px solid #21262d; background: #0d1117; gap: 16px; }
  .header h1 { font-size: 17px; color: #f0f6fc; }
  .source-box { font-size: 10px; color: #8b949e; line-height: 1.55; text-align: right; max-width: 520px; }
  .source-box .src-line { color: #c9d1d9; font-weight: 600; }
  .source-box .src-disclaimer { color: #6e7681; font-size: 10px; padding-top: 2px; border-top: 1px dashed #21262d; margin-top: 4px; }
  .main { padding: 14px 16px 32px; max-width: 1600px; margin: 0 auto; }
  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: baseline; gap: 12px; padding: 8px 4px; border-bottom: 2px solid #1f6feb; margin-bottom: 12px; }
  .section-header h2 { font-size: 15px; font-weight: 700; color: #f0f6fc; }
  .section-header .subtitle { font-size: 11px; color: #8b949e; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 10px; }
  .card-grid.cols-1 { grid-template-columns: 1fr; }
  .card-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .card-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 1100px) {
    .card-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .card-grid.cols-2, .card-grid.cols-3 { grid-template-columns: 1fr; }
  }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; overflow: hidden; }
  .card-top { padding: 8px 12px; border-bottom: 1px solid #21262d; background: #1c2128; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .card-top h3 { font-size: 12px; font-weight: 600; color: #f0f6fc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-table .card-top h3 { font-size: 13px; font-weight: 700; color: #f0f6fc; }
  .card-top .fig-num { font-size: 10px; color: #6e7681; font-weight: 500; flex-shrink: 0; }
  .card-meta { font-size: 10px; color: #8b949e; padding: 2px 12px 0; }
  .legend-row { display: flex; gap: 12px; padding: 4px 12px 0; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #8b949e; }
  .legend-item .dot { width: 8px; height: 2px; border-radius: 1px; }
  .cw { width: 100%; height: 220px; position: relative; cursor: crosshair; }
  /* 차트 세로축 상단 단위 라벨 */
  .cw-axis-unit { position: absolute; font-size: 10px; color: #8b949e; pointer-events: none; z-index: 5; padding: 2px 4px; background: rgba(22,27,34,0.7); border-radius: 2px; }
  .cw-axis-unit.left { top: 4px; left: 6px; }
  .cw-axis-unit.right { top: 4px; right: 6px; }
  /* 차트 호버 툴팁 */
  .cw-tooltip { position: absolute; top: 8px; left: 8px; background: rgba(13,17,23,0.95); border: 1px solid #30363d; border-radius: 4px; padding: 5px 8px; font-size: 11px; color: #c9d1d9; pointer-events: none; z-index: 10; display: none; line-height: 1.5; min-width: 130px; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
  .cw-tooltip .tt-date { color: #8b949e; font-size: 10px; padding-bottom: 3px; border-bottom: 1px solid #21262d; margin-bottom: 3px; font-weight: 600; }
  .cw-tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; }
  .cw-tooltip .tt-label { display: flex; align-items: center; gap: 4px; }
  .cw-tooltip .tt-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
  .cw-tooltip .tt-value { font-variant-numeric: tabular-nums; font-weight: 600; }
  .cw-tbd { display: flex; align-items: center; justify-content: center; color: #484f58; font-size: 11px; background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(48,54,61,0.18) 8px, rgba(48,54,61,0.18) 9px); }
  .card-tbd .card-top { background: #1a1f26; }
  .card-tbd .card-top h3 { color: #8b949e; }
  .source-note { font-size: 11px; color: #6e7681; margin-top: 6px; padding-left: 4px; }
  /* 최근 데이터 표 (차트 하단) */
  .recent-data { padding: 6px 10px 8px; border-top: 1px solid #21262d; overflow-x: auto; }
  .recent-data table { width: 100%; border-collapse: collapse; font-size: 10px; font-variant-numeric: tabular-nums; }
  .recent-data th { font-weight: 500; color: #8b949e; text-align: right; padding: 2px 4px; white-space: nowrap; }
  .recent-data td { color: #c9d1d9; text-align: right; padding: 2px 4px; white-space: nowrap; }
  .recent-data thead th { color: #6e7681; font-weight: 400; border-bottom: 1px solid #21262d; }
  .recent-data tbody th { color: #c9d1d9; text-align: left; padding-right: 8px; }
  .recent-data tbody th .legend-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  /* 커버리지 표 카드 */
  .coverage-table { width: 100%; padding: 0; overflow-x: auto; cursor: default; }
  .coverage-table .table-meta { padding: 6px 14px; font-size: 11px; color: #8b949e; display: flex; justify-content: space-between; border-bottom: 1px solid #21262d; }
  .coverage-table .table-meta .unit { color: #8b949e; font-weight: 500; font-style: italic; }
  .coverage-table table { width: 100%; border-collapse: collapse; font-size: 12px; font-variant-numeric: tabular-nums; }
  /* 헤더 */
  .coverage-table thead th { font-weight: 600; color: #8b949e; padding: 8px 10px; text-align: right; white-space: nowrap; border-bottom: 1px solid #484f58; background: #1c2128; }
  .coverage-table thead th:first-child, .coverage-table thead th:nth-child(2) { text-align: left; }
  .coverage-table thead th.forecast { color: #c9d1d9; }
  /* tbody 기본 */
  .coverage-table tbody th { text-align: left; padding: 5px 10px; white-space: nowrap; }
  .coverage-table tbody td { text-align: right; padding: 5px 10px; white-space: nowrap; color: #f0f6fc; font-weight: 500; }
  /* level 들여쓰기 + 색 위계 */
  .coverage-table tbody tr.lvl-0 { background: rgba(255, 255, 255, 0.04); }
  .coverage-table tbody tr.lvl-1 { background: rgba(255, 255, 255, 0.015); }
  .coverage-table tbody tr.lvl-2 { background: transparent; }
  .coverage-table tbody tr.lvl-0 th { color: #f0f6fc; font-weight: 700; padding-left: 12px; font-size: 12.5px; letter-spacing: 0.3px; text-transform: none; }
  .coverage-table tbody tr.lvl-1 th { color: #f0f6fc; font-weight: 600; padding-left: 28px; }
  .coverage-table tbody tr.lvl-2 th { color: #c9d1d9; font-weight: 400; padding-left: 44px; }
  .coverage-table tbody tr.lvl-2 th.metric-label { color: #8b949e; font-style: italic; padding-left: 56px; font-size: 11.5px; }
  /* 카테고리 헤더 row (cat-major) */
  .coverage-table tbody tr.cat-major th, .coverage-table tbody tr.cat-major td { border-top: 1px solid #484f58; padding-top: 8px; }
  .coverage-table tbody tr.cat-start th, .coverage-table tbody tr.cat-start td { border-top: 1px solid #30363d; padding-top: 6px; }
  /* 카테고리 헤더 단독 row (is-header, cells 비) */
  .coverage-table tbody tr.is-header th { font-size: 13px; padding-top: 10px; padding-bottom: 6px; letter-spacing: 0.3px; }
  /* forecast 영역 음영 */
  .coverage-table td.forecast { background: rgba(255, 255, 255, 0.035); color: #f0f6fc; }
  .coverage-table tbody tr.lvl-0 td.forecast { background: rgba(255, 255, 255, 0.07); }
  /* hover */
  .coverage-table tbody tr:hover td, .coverage-table tbody tr:hover th { background: rgba(255,255,255, 0.04); }
  /* 행 간 구분선 */
  .coverage-table tbody td, .coverage-table tbody th { border-bottom: 1px solid #1e2229; }
</style>
</head>

function buildPage() {
  const main = document.getElementById('main');
  const renderQueue = [];  // 모든 카드 DOM attach 후 일괄 렌더링
  SECTIONS.forEach(sec => {
    const secDiv = document.createElement('div');
    secDiv.className = 'section';
    const colsClass = sec.cols === 1 ? ' cols-1' : (sec.cols === 2 ? ' cols-2' : (sec.cols === 3 ? ' cols-3' : ''));
    secDiv.innerHTML = `
      <div class="section-header">
        <h2>${sec.title}</h2>
        <span class="subtitle">${sec.subtitle}</span>
      </div>
      <div class="card-grid${colsClass}"></div>
    `;
    const grid = secDiv.querySelector('.card-grid');
    sec.cards.forEach(card => {
      const cardId = `card-fig-${card.fig}`;
      const cwId = `cw-fig-${card.fig}`;
      const isTbd = !card.chart_def;
      const cardEl = document.createElement('div');
      const isTbl = card.chart_def && card.chart_def.type === 'table';
      cardEl.className = 'card' + (isTbd ? ' card-tbd' : '') + (isTbl ? ' card-table' : '');
      cardEl.id = cardId;
      let legendHtml = '';
      if (card.chart_def && card.chart_def.series) {
        legendHtml = '<div class="legend-row">' +
          card.chart_def.series.map(s =>
            `<span class="legend-item"><span class="dot" style="background:${s.color}"></span>${s.label}</span>`
          ).join('') + '</div>';
      }
      cardEl.innerHTML = `
        <div class="card-top">
          <h3>${card.title}</h3>
          <span class="fig-num">도표 ${card.fig}</span>
        </div>
        ${legendHtml}
        <div class="cw ${isTbd ? 'cw-tbd' : ''}" id="${cwId}">${isTbd ? '데이터 추출 예정' : ''}</div>
      `;
      grid.appendChild(cardEl);
      if (card.chart_def) renderQueue.push([cwId, card.chart_def]);
    });
    main.appendChild(secDiv);  // section을 main 에 먼저 attach
  });
  // 모든 카드가 document에 붙은 뒤 일괄 차트 렌더링
  renderQueue.forEach(([cwId, def]) => renderChart(cwId, def));
}

// =========================================================================
// 차트 렌더링 (lightweight-charts)
// =========================================================================
async function fetchSeries(file) {
  const r = await fetch(DATA_DIR + file);
  if (!r.ok) throw new Error(`fetch failed: ${file}`);
  const j = await r.json();
  return j.data.map(d => ({ time: d.date, value: d.value }));
}

// 12개월 YoY 자동 계산 (시간 기반 — 약 365일 전 가장 가까운 데이터)
function computeYoY(data, windowDays = 365, toleranceDays = 35) {
  if (!data || data.length < 2) return [];
  const ms = data.map(d => new Date(d.time).getTime());
  const out = [];
  let j = 0;
  for (let i = 0; i < data.length; i++) {
    const target = ms[i] - windowDays * 86400000;
    while (j < i && ms[j] < target - toleranceDays * 86400000) j++;
    // j 부터 시작해서 target에 가장 가까운 것
    let best = -1, bestDiff = Infinity;
    for (let k = j; k < i; k++) {
      const diff = Math.abs(ms[k] - target);
      if (diff < bestDiff) { bestDiff = diff; best = k; }
      if (ms[k] > target + toleranceDays * 86400000) break;
    }
    if (best >= 0 && bestDiff <= toleranceDays * 86400000) {
      const prev = data[best].value;
      if (prev !== 0 && prev != null) {
        out.push({ time: data[i].time, value: Math.round(((data[i].value - prev) / Math.abs(prev)) * 1000) / 10 });
      }
    }
  }
  return out;
}

// 데이터 빈도에 맞춰 최근 N개 샘플 추출 (일별 → 월별, 분기 → 그대로)
function getRecentSamples(data, count = 6) {
  if (!data || data.length === 0) return [];
  if (data.length <= count) return data;
  const intervalDays = (new Date(data[data.length - 1].time) - new Date(data[0].time)) / (data.length * 86400000);
  if (intervalDays < 7) {
    // 일별/주별 데이터 — 월말(또는 월의 마지막) 기준 샘플링
    const monthLast = {};
    data.forEach(d => { monthLast[d.time.slice(0, 7)] = d; });
    return Object.values(monthLast).sort((a, b) => a.time.localeCompare(b.time)).slice(-count);
  }
  // 분기/연간 데이터 — 그대로 last N
  return data.slice(-count);
}

function formatNum(v) {
  if (v == null || isNaN(v)) return '—';
  const a = Math.abs(v);
  if (a >= 1000) return Math.round(v).toLocaleString();
  if (a >= 100) return v.toFixed(1);
  if (a >= 10) return v.toFixed(2);
  return v.toFixed(2);
}

function formatTimeLabel(t, intervalDays) {
  // YYYY-MM-DD (10 chars). 월별 stride면 YYYY-MM, 분기 stride면 YY-Qn 표시 가능
  if (!t || t.length < 7) return t || '';
  const yyyymm = t.slice(0, 7); // "2026-04"
  if (intervalDays >= 60) {
    // 분기 데이터 — 'YY Qn' 형식
    const m = parseInt(t.slice(5, 7), 10);
    const q = Math.floor((m - 1) / 3) + 1;
    return `${t.slice(2, 4)} Q${q}`;
  }
  return yyyymm;
}

// chart_def + 모든 series 데이터 → 하단 데이터 표 HTML
function buildRecentTable(seriesData) {
  if (!seriesData || !seriesData.length) return '';
  const samplesPer = seriesData.map(s => getRecentSamples(s.data, 6));
  // 첫 series 시점을 컬럼 기준으로 (다른 series는 같은 시점에 매칭)
  const baseSamples = samplesPer[0];
  if (!baseSamples || !baseSamples.length) return '';
  const intervalDays = baseSamples.length >= 2 ?
    (new Date(baseSamples[baseSamples.length - 1].time) - new Date(baseSamples[0].time)) /
    ((baseSamples.length - 1) * 86400000) : 0;
  const cols = baseSamples.map(d => d.time);

  let html = '<div class="recent-data"><table><thead><tr><th></th>';
  cols.forEach(t => { html += `<th>${formatTimeLabel(t, intervalDays)}</th>`; });
  html += '</tr></thead><tbody>';
  seriesData.forEach((s, idx) => {
    const samples = samplesPer[idx];
    // 다른 series의 sample 시점이 base와 다르면 lookup
    const lookup = {};
    samples.forEach(d => { lookup[d.time.slice(0, 7)] = d.value; });
    html += `<tr><th><span class="legend-dot" style="background:${s.color}"></span>${s.label}</th>`;
    cols.forEach(t => {
      const v = lookup[t.slice(0, 7)];
      html += `<td>${v != null ? formatNum(v) : '—'}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// 카테고리 라벨 → indent level (PDF 원본 들여쓰기 재현)
const _CAT_LEVEL = {
  // level 0 (사업부문/총합)
  '반도체': 0, '디스플레이': 0, 'MX/NW': 0, 'VD/DA': 0, 'Harman': 0, 'Total': 0,
  '원/달러 평균': 0, 'Bit Growth': 0, 'ASP Growth': 0, '매출액': 0, '매출비중': 0,
  '매출액 Growth': 0, '영업이익': 0, '영업이익률': 0,
  // level 1 (대분류 안 중분류)
  'Memory': 1, 'non-Memory': 1, 'Mobile': 1, 'Mobile Total': 1, 'Smart Phone': 1,
  'LCD TV': 1, 'DRAM': 1, 'NAND': 1, 'Others': 1,
};

function _isForecastCol(colName) {
  if (!colName) return false;
  const s = String(colName);
  return /[FP]$/.test(s) || /F$/.test(s);  // "1Q26F", "2025F", "1Q26P" 등
}

async function renderTable(containerId, def) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.classList.remove('cw');
  el.classList.add('coverage-table');
  el.style.height = 'auto';
  el.innerHTML = '<div style="color:#6e7681;font-size:11px;padding:6px;">로딩...</div>';
  try {
    const r = await fetch(DATA_DIR + def.file);
    if (!r.ok) throw new Error('fetch failed: ' + def.file);
    const d = await r.json();
    const cols = d.columns || [];
    const rows = d.rows || [];
    const colIsForecast = cols.map(c => /[FP]$/.test(String(c||'')));
    const unitLabel = d.unit_label || d.unit || '';
    let html = '';
    if (unitLabel) {
      html += '<div class="table-meta"><span></span><span class="unit">(' + unitLabel + ')</span></div>';
    }
    html += '<table><thead><tr><th></th><th></th>';
    cols.forEach((c, i) => { html += '<th' + (colIsForecast[i] ? ' class="forecast"' : '') + '>' + (c||'') + '</th>'; });
    html += '</tr></thead><tbody>';
    let prevTopCat = null;
    rows.forEach(row => {
      if (row._skip) return;
      const l1 = (row.label1 || '').trim();
      const l2 = (row.label2 || '').trim();
      const cells = row.cells || {};
      const lvl = (typeof row._level === 'number') ? row._level : 0;
      const isHeader = !!row._is_header;
      // 빈 row + cells에 헤더값이 mirror된 경우 skip
      if (!l1 && !l2 && Object.keys(cells).length === 0) return;
      if (cells[cols[0]] === cols[0]) return;  // 헤더 reflection skip

      // 새 top-level 카테고리 시작 표시 (cat-major)
      let rowCls = 'lvl-' + lvl;
      if (isHeader) rowCls += ' is-header';
      if (lvl === 0 && (l1 !== prevTopCat || isHeader)) {
        rowCls += ' cat-major';
        prevTopCat = l1;
      } else if (lvl === 1 && isHeader) {
        rowCls += ' cat-start';
      }

      html += '<tr class="' + rowCls + '">';
      // 카테고리 헤더 (cells 비, _is_header) — colspan 모두 차지
      if (isHeader && Object.keys(cells).length === 0) {
        html += '<th colspan="' + (cols.length + 2) + '">' + (l1 || l2) + '</th>';
        html += '</tr>';
        return;
      }
      // 일반 row
      html += '<th>' + l1 + '</th>';
      html += '<th' + (lvl === 2 ? ' class="metric-label"' : '') + '>' + l2 + '</th>';
      cols.forEach((c, i) => {
        const v = cells[c] || '';
        html += '<td' + (colIsForecast[i] ? ' class="forecast"' : '') + '>' + v + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div style="color:#f97583;padding:6px;">표 로드 실패: ' + e.message + '</div>';
    console.error('[renderTable]', e);
  }
}

async function renderChart(containerId, def) {
  if (def && def.type === 'table') return await renderTable(containerId, def);
  const el = document.getElementById(containerId);
  if (!el) {
    console.warn(`[renderChart] no element for ${containerId}`);
    return;
  }
  console.log(`[renderChart] start ${containerId}`, { type: def.type, series: def.series.length });
  try {
    if (typeof LightweightCharts === 'undefined') {
      throw new Error('LightweightCharts global not defined — script load failed');
    }
    if (def.height) el.style.height = def.height + 'px';
    const w = el.clientWidth || el.offsetWidth || 400;
    const h = el.clientHeight || el.offsetHeight || (def.height || 220);
    const opts = { ...CHART_OPTS, width: w, height: h };
    if (def.type === 'dual_axis') {
      opts.leftPriceScale = { ...opts.leftPriceScale, visible: true };
      opts.rightPriceScale = { ...opts.rightPriceScale, visible: true };
    } else {
      opts.leftPriceScale = { visible: false };
      opts.rightPriceScale = { ...opts.rightPriceScale, visible: true };
    }
    const chart = LightweightCharts.createChart(el, opts);
    new ResizeObserver(es => {
      const r = es[0].contentRect;
      if (r.width > 0 && r.height > 0) chart.applyOptions({ width: r.width, height: r.height });
    }).observe(el);

    // 단위 → priceFormat formatter
    const unitL = def.unit_left || '';
    const unitR = def.unit_right || '';
    // 가격 라벨용 — 숫자만 (각 라벨에 단위 중복 X). 단위는 상단 cw-axis-unit에 별도 표시.
    const numberOnly = (v) => {
      if (v == null || isNaN(v)) return '';
      const a = Math.abs(v);
      if (a >= 1000) return Math.round(v).toLocaleString();
      if (a >= 100) return v.toFixed(1);
      if (a >= 10) return v.toFixed(2);
      return v.toFixed(2);
    };
    // 툴팁/하단 표 — 숫자 + 단위
    const makeFormatter = (unit) => (v) => {
      const s = numberOnly(v);
      return s && unit ? s + ' ' + unit : s;
    };
    // 차트 좌상단 단위 라벨 추가 (중복 라벨 제거)
    if (unitL) {
      const lbl = document.createElement('div');
      lbl.className = 'cw-axis-unit left';
      lbl.textContent = `(${unitL})`;
      el.appendChild(lbl);
    }
    if (unitR) {
      const lbl = document.createElement('div');
      lbl.className = 'cw-axis-unit right';
      lbl.textContent = `(${unitR})`;
      el.appendChild(lbl);
    }
    const seriesByObj = new Map();  // series 객체 → meta
    // Z-order: bar/histogram 먼저 추가 → line 시리즈가 위에 렌더링되도록 강제 정렬
    const sortedSeries = [...def.series].sort((a, b) => {
      const aIsBar = (a.kind || def.kind) === 'bar' || (a.kind || def.kind) === 'histogram';
      const bIsBar = (b.kind || def.kind) === 'bar' || (b.kind || def.kind) === 'histogram';
      return (bIsBar ? 1 : 0) - (aIsBar ? 1 : 0);  // bar 먼저(0), line 나중(1)
    });
    // 순차 await — Promise.all로 인한 race condition 방지
    const seriesData = [];
    for (const s of sortedSeries) {
      let data = await fetchSeries(s.file);
      const seen = new Set();
      data = data.filter(d => { if (seen.has(d.time)) return false; seen.add(d.time); return true; });
      // derived 시리즈 처리 (yoy 등)
      const cleaned = (s.derived === 'yoy') ? computeYoY(data) : data;
      const isLeft = (def.type === 'dual_axis' && s.axis === 'left');
      const priceScaleId = isLeft ? 'left' : 'right';
      const unit = isLeft ? unitL : (def.type === 'dual_axis' ? unitR : unitL);
      const kind = s.kind || def.kind || 'line';
      const fmtOpts = { type: 'custom', formatter: numberOnly, minMove: 0.01 };
      let series;
      if (kind === 'bar' || kind === 'histogram') {
        series = chart.addHistogramSeries({
          color: s.color,
          priceLineVisible: false, lastValueVisible: true,
          priceScaleId, priceFormat: fmtOpts,
        });
      } else {
        series = chart.addLineSeries({
          color: s.color, lineWidth: 2.5,
          priceLineVisible: false, lastValueVisible: true,
          priceScaleId, priceFormat: fmtOpts,
        });
      }
      series.setData(cleaned);
      seriesByObj.set(series, { label: s.label, color: s.color, unit });
      seriesData.push({ label: s.label, color: s.color, data: cleaned, series, unit });
    }
    chart.timeScale().fitContent();
    // 호버 툴팁
    const tooltipEl = document.createElement('div');
    tooltipEl.className = 'cw-tooltip';
    el.appendChild(tooltipEl);
    chart.subscribeCrosshairMove(param => {
      if (!param.time || !param.seriesData || !param.seriesData.size) {
        tooltipEl.style.display = 'none';
        return;
      }
      const dateLbl = (typeof param.time === 'string') ? param.time : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
      let html = `<div class="tt-date">${dateLbl}</div>`;
      param.seriesData.forEach((d, ser) => {
        const meta = seriesByObj.get(ser);
        if (!meta || d.value == null) return;
        const fmt = makeFormatter(meta.unit);
        html += `<div class="tt-row"><span class="tt-label"><span class="tt-dot" style="background:${meta.color}"></span>${meta.label}</span><span class="tt-value">${fmt(d.value)}</span></div>`;
      });
      tooltipEl.innerHTML = html;
      tooltipEl.style.display = 'block';
      // 툴팁 위치 — 마우스 우상단 또는 좌상단 (차트 절반 기준 flip)
      const w = el.clientWidth, h = el.clientHeight;
      const x = param.point.x, y = param.point.y;
      const tw = tooltipEl.offsetWidth || 140, th = tooltipEl.offsetHeight || 60;
      let left = x + 12, top = y + 12;
      if (left + tw > w - 4) left = x - tw - 12;
      if (top + th > h - 4) top = y - th - 12;
      tooltipEl.style.left = Math.max(4, left) + 'px';
      tooltipEl.style.top = Math.max(4, top) + 'px';
    });
    // 차트 하단에 최근 6개 데이터 표 추가 (no_recent 플래그가 true면 skip)
    if (!def.no_recent) {
      const tableHtml = buildRecentTable(seriesData);
      if (tableHtml) {
        const card = el.closest('.card');
        if (card) card.insertAdjacentHTML('beforeend', tableHtml);
      }
    }
  } catch (e) {
    el.classList.add('cw-tbd');
    el.textContent = '차트 로드 실패: ' + e.message;
    console.error(`[${containerId}] FAILED:`, e);
  }
}

// PDF 발행일자 표시 — 임의 JSON에서 source 필드 추출
async function showPdfPubDate() {
  try {
    const r = await fetch(DATA_DIR + 'export_semi_amount.json');
    if (!r.ok) return;
    const d = await r.json();
    const src = d.source || '';
    // Weekly_Roko_260427.pdf → 2026.04.27
    const m = src.match(/(\d{2})(\d{2})(\d{2})/);
    if (m) {
      const [, yy, mm, dd] = m;
      const dateStr = '20' + yy + '.' + mm + '.' + dd + ' 자';
      const lbl = document.getElementById('pdf-pub-date');
      if (lbl) lbl.textContent = dateStr;
    }
  } catch (e) { console.warn('pubDate extract failed', e); }
}
document.addEventListener('DOMContentLoaded', () => { buildPage(); showPdfPubDate(); });
