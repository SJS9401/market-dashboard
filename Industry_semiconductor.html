  handleScroll: { mouseWheel: false, pressedMouseMove: false, horzTouchDrag: false, vertTouchDrag: false },
};

// =========================================================================
// 페이지 빌드
// =========================================================================
function buildPage() {
  const main = document.getElementById('main');
  const renderQueue = [];  // 모든 카드 DOM attach 후 일괄 렌더링
  SECTIONS.forEach(sec => {
    const secDiv = document.createElement('div');
    secDiv.className = 'section';
    const colsClass = sec.cols === 2 ? ' cols-2' : (sec.cols === 3 ? ' cols-3' : '');
    secDiv.innerHTML = `
      <div class="section-header">
        <h2>${sec.title}</h2>
        <span class="subtitle">${sec.subtitle}</span>
      </div>
      <div class="card-grid${colsClass}"></div>
    `;
    const grid = secDiv.querySelector('.card-grid');
    sec.cards.forEach(card => {
      const cardId = `card-fig-${card.fig}`;
      const cwId = `cw-fig-${card.fig}`;
      const isTbd = !card.chart_def;
      const cardEl = document.createElement('div');
      cardEl.className = 'card' + (isTbd ? ' card-tbd' : '');
      cardEl.id = cardId;
      let legendHtml = '';
      if (card.chart_def && card.chart_def.series) {
        legendHtml = '<div class="legend-row">' +
          card.chart_def.series.map(s =>
            `<span class="legend-item"><span class="dot" style="background:${s.color}"></span>${s.label}</span>`
          ).join('') + '</div>';
      }
      cardEl.innerHTML = `
        <div class="card-top">
          <h3>${card.title}</h3>
          <span class="fig-num">도표 ${card.fig}</span>
        </div>
        ${legendHtml}
        <div class="cw ${isTbd ? 'cw-tbd' : ''}" id="${cwId}">${isTbd ? '데이터 추출 예정' : ''}</div>
      `;
      grid.appendChild(cardEl);
      if (card.chart_def) renderQueue.push([cwId, card.chart_def]);
    });
    main.appendChild(secDiv);  // section을 main 에 먼저 attach
  });
  // 모든 카드가 document에 붙은 뒤 일괄 차트 렌더링
  renderQueue.forEach(([cwId, def]) => renderChart(cwId, def));
}

// =========================================================================
// 차트 렌더링 (lightweight-charts)
// =========================================================================
async function fetchSeries(file) {
  const r = await fetch(DATA_DIR + file);
  if (!r.ok) throw new Error(`fetch failed: ${file}`);
  const j = await r.json();
  return j.data.map(d => ({ time: d.date, value: d.value }));
}

// 12개월 YoY 자동 계산 (시간 기반 — 약 365일 전 가장 가까운 데이터)
function computeYoY(data, windowDays = 365, toleranceDays = 35) {
  if (!data || data.length < 2) return [];
  const ms = data.map(d => new Date(d.time).getTime());
  const out = [];
  let j = 0;
  for (let i = 0; i < data.length; i++) {
    const target = ms[i] - windowDays * 86400000;
    while (j < i && ms[j] < target - toleranceDays * 86400000) j++;
    // j 부터 시작해서 target에 가장 가까운 것
    let best = -1, bestDiff = Infinity;
    for (let k = j; k < i; k++) {
      const diff = Math.abs(ms[k] - target);
      if (diff < bestDiff) { bestDiff = diff; best = k; }
      if (ms[k] > target + toleranceDays * 86400000) break;
    }
    if (best >= 0 && bestDiff <= toleranceDays * 86400000) {
      const prev = data[best].value;
      if (prev !== 0 && prev != null) {
        out.push({ time: data[i].time, value: Math.round(((data[i].value - prev) / Math.abs(prev)) * 1000) / 10 });
      }
    }
  }
  return out;
}

// 데이터 빈도에 맞춰 최근 N개 샘플 추출 (일별 → 월별, 분기 → 그대로)
function getRecentSamples(data, count = 6) {
  if (!data || data.length === 0) return [];
  if (data.length <= count) return data;
  const intervalDays = (new Date(data[data.length - 1].time) - new Date(data[0].time)) / (data.length * 86400000);
  if (intervalDays < 7) {
    // 일별/주별 데이터 — 월말(또는 월의 마지막) 기준 샘플링
    const monthLast = {};
    data.forEach(d => { monthLast[d.time.slice(0, 7)] = d; });
    return Object.values(monthLast).sort((a, b) => a.time.localeCompare(b.time)).slice(-count);
  }
  // 분기/연간 데이터 — 그대로 last N
  return data.slice(-count);
}

function formatNum(v) {
  if (v == null || isNaN(v)) return '—';
  const a = Math.abs(v);
  if (a >= 1000) return Math.round(v).toLocaleString();
  if (a >= 100) return v.toFixed(1);
  if (a >= 10) return v.toFixed(2);
  return v.toFixed(2);
}

function formatTimeLabel(t, intervalDays) {
  // YYYY-MM-DD (10 chars). 월별 stride면 YYYY-MM, 분기 stride면 YY-Qn 표시 가능
  if (!t || t.length < 7) return t || '';
  const yyyymm = t.slice(0, 7); // "2026-04"
  if (intervalDays >= 60) {
    // 분기 데이터 — 'YY Qn' 형식
    const m = parseInt(t.slice(5, 7), 10);
    const q = Math.floor((m - 1) / 3) + 1;
    return `${t.slice(2, 4)} Q${q}`;
  }
  return yyyymm;
}

// chart_def + 모든 series 데이터 → 하단 데이터 표 HTML
function buildRecentTable(seriesData) {
  if (!seriesData || !seriesData.length) return '';
  const samplesPer = seriesData.map(s => getRecentSamples(s.data, 6));
  // 첫 series 시점을 컬럼 기준으로 (다른 series는 같은 시점에 매칭)
  const baseSamples = samplesPer[0];
  if (!baseSamples || !baseSamples.length) return '';
  const intervalDays = baseSamples.length >= 2 ?
    (new Date(baseSamples[baseSamples.length - 1].time) - new Date(baseSamples[0].time)) /
    ((baseSamples.length - 1) * 86400000) : 0;
  const cols = baseSamples.map(d => d.time);

  let html = '<div class="recent-data"><table><thead><tr><th></th>';
  cols.forEach(t => { html += `<th>${formatTimeLabel(t, intervalDays)}</th>`; });
  html += '</tr></thead><tbody>';
  seriesData.forEach((s, idx) => {
    const samples = samplesPer[idx];
    // 다른 series의 sample 시점이 base와 다르면 lookup
    const lookup = {};
    samples.forEach(d => { lookup[d.time.slice(0, 7)] = d.value; });
    html += `<tr><th><span class="legend-dot" style="background:${s.color}"></span>${s.label}</th>`;
    cols.forEach(t => {
      const v = lookup[t.slice(0, 7)];
      html += `<td>${v != null ? formatNum(v) : '—'}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

async function renderChart(containerId, def) {
  const el = document.getElementById(containerId);
  if (!el) {
    console.warn(`[renderChart] no element for ${containerId}`);
    return;
  }
  console.log(`[renderChart] start ${containerId}`, { type: def.type, series: def.series.length });
  try {
    if (typeof LightweightCharts === 'undefined') {
      throw new Error('LightweightCharts global not defined — script load failed');
    }
    const w = el.clientWidth || el.offsetWidth || 400;
    const h = el.clientHeight || el.offsetHeight || 220;
    const opts = { ...CHART_OPTS, width: w, height: h };
    if (def.type === 'dual_axis') {
      opts.leftPriceScale = { ...opts.leftPriceScale, visible: true };
      opts.rightPriceScale = { ...opts.rightPriceScale, visible: true };
    } else {
      opts.leftPriceScale = { visible: false };
      opts.rightPriceScale = { ...opts.rightPriceScale, visible: true };
    }
    const chart = LightweightCharts.createChart(el, opts);
    new ResizeObserver(es => {
      const r = es[0].contentRect;
      if (r.width > 0 && r.height > 0) chart.applyOptions({ width: r.width, height: r.height });
    }).observe(el);

    // 단위 → priceFormat formatter
    const unitL = def.unit_left || '';
    const unitR = def.unit_right || '';
    const makeFormatter = (unit) => {
      return (v) => {
        if (v == null || isNaN(v)) return '';
        const a = Math.abs(v);
        let s;
        if (a >= 1000) s = Math.round(v).toLocaleString();
        else if (a >= 100) s = v.toFixed(1);
        else if (a >= 10) s = v.toFixed(2);
        else s = v.toFixed(2);
        return unit ? s + ' ' + unit : s;
      };
    };
    const seriesByObj = new Map();  // series 객체 → meta
    const seriesData = await Promise.all(def.series.map(async (s) => {
      let data = await fetchSeries(s.file);
      const seen = new Set();
      data = data.filter(d => { if (seen.has(d.time)) return false; seen.add(d.time); return true; });
      // derived 시리즈 처리 (yoy 등)
      const cleaned = (s.derived === 'yoy') ? computeYoY(data) : data;
      const isLeft = (def.type === 'dual_axis' && s.axis === 'left');
      const priceScaleId = isLeft ? 'left' : 'right';
      const unit = isLeft ? unitL : (def.type === 'dual_axis' ? unitR : unitL);
      const kind = s.kind || def.kind || 'line';
      const fmtOpts = { type: 'custom', formatter: makeFormatter(unit), minMove: 0.01 };
      let series;
      if (kind === 'bar' || kind === 'histogram') {
        series = chart.addHistogramSeries({
          color: s.color,
          priceLineVisible: false, lastValueVisible: true,
          priceScaleId, priceFormat: fmtOpts,
        });
      } else {
        series = chart.addLineSeries({
          color: s.color, lineWidth: 1.5,
          priceLineVisible: false, lastValueVisible: true,
          priceScaleId, priceFormat: fmtOpts,
        });
      }
      series.setData(cleaned);
      seriesByObj.set(series, { label: s.label, color: s.color, unit });
      return { label: s.label, color: s.color, data: cleaned, series, unit };
    }));
    chart.timeScale().fitContent();
    // 호버 툴팁
    const tooltipEl = document.createElement('div');
    tooltipEl.className = 'cw-tooltip';
    el.appendChild(tooltipEl);
    chart.subscribeCrosshairMove(param => {
      if (!param.time || !param.seriesData || !param.seriesData.size) {
        tooltipEl.style.display = 'none';
        return;
      }
      const dateLbl = (typeof param.time === 'string') ? param.time : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
      let html = `<div class="tt-date">${dateLbl}</div>`;
      param.seriesData.forEach((d, ser) => {
        const meta = seriesByObj.get(ser);
        if (!meta || d.value == null) return;
        const fmt = makeFormatter(meta.unit);
        html += `<div class="tt-row"><span class="tt-label"><span class="tt-dot" style="background:${meta.color}"></span>${meta.label}</span><span class="tt-value">${fmt(d.value)}</span></div>`;
      });
      tooltipEl.innerHTML = html;
      tooltipEl.style.display = 'block';
      // 툴팁 위치 — 마우스 우상단 또는 좌상단 (차트 절반 기준 flip)
      const w = el.clientWidth, h = el.clientHeight;
      const x = param.point.x, y = param.point.y;
      const tw = tooltipEl.offsetWidth || 140, th = tooltipEl.offsetHeight || 60;
      let left = x + 12, top = y + 12;
      if (left + tw > w - 4) left = x - tw - 12;
      if (top + th > h - 4) top = y - th - 12;
      tooltipEl.style.left = Math.max(4, left) + 'px';
      tooltipEl.style.top = Math.max(4, top) + 'px';
    });
    // 차트 하단에 최근 6개 데이터 표 추가
    const tableHtml = buildRecentTable(seriesData);
    if (tableHtml) {
      const card = el.closest('.card');
      if (card) card.insertAdjacentHTML('beforeend', tableHtml);
    }
  } catch (e) {
    el.classList.add('cw-tbd');
    el.textContent = '차트 로드 실패: ' + e.message;
    console.error(`[${containerId}] FAILED:`, e);
  }
}

document.addEventListener('DOMContentLoaded', buildPage);
</script>
</body>
</html>
