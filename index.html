<html lang="ko">
<head>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, 'Pretendard', 'Segoe UI', sans-serif; overflow-x: hidden; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 24px; border-bottom: 1px solid #21262d; background: #0d1117; }
  .header h1 { font-size: 17px; color: #f0f6fc; } .header .time { font-size: 12px; color: #8b949e; }
  .main { display: flex; gap: 10px; padding: 10px; max-width: 1600px; margin: 0 auto; }
  .col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0; position: relative; }
  .col-xline { position: absolute; top: 0; bottom: 14px; width: 0; border-left: 1px dashed rgba(117,134,150,0.7); pointer-events: none; display: none; z-index: 99999; }
  .xdate { font-size: 10px; color: #8b949e; margin-left: 6px; font-weight: 400; }
  .col .card { border-radius: 0; border-bottom: none; }
  .col .card:first-child { border-radius: 10px 10px 0 0; }
  .col .card:last-child { border-radius: 0; border-bottom: 1px solid #21262d; }
  .card { background: #161b22; border: 1px solid #21262d; overflow: hidden; }
  .card-top { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-bottom: 1px solid #21262d; background: #1c2128; flex-wrap: wrap; gap: 4px; }
  .card-top .left { display: flex; align-items: baseline; gap: 8px; }
  .card-top h3 { font-size: 12px; font-weight: 600; color: #f0f6fc; white-space: nowrap; }
  .card-top .price { font-size: 13px; font-weight: 700; color: #f0f6fc; }
  .card-top .chg { font-size: 10px; font-weight: 600; }
  .chg.up { color: #f04452; } .chg.down { color: #3182f6; } .chg.flat { color: #8b949e; }
  .range-btns { display: flex; gap: 2px; }
  .range-btns button { background: none; border: 1px solid #30363d; color: #8b949e; padding: 1px 7px; border-radius: 4px; font-size: 10px; cursor: pointer; }
  .range-btns button:hover { border-color: #58a6ff; color: #58a6ff; }
  .range-btns button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .interval-btns { display: flex; gap: 2px; margin-left: 6px; }
  .interval-btns button { background: none; border: 1px solid #30363d; color: #8b949e; padding: 1px 7px; border-radius: 4px; font-size: 10px; cursor: pointer; }
  .bar-count { display: flex; align-items: center; gap: 2px; margin-left: 6px; }
  .bar-count input { width: 38px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 1px 4px; border-radius: 4px; font-size: 10px; text-align: center; outline: none; }
  .bar-count input:focus { border-color: #58a6ff; }
  .bar-count span { font-size: 10px; color: #8b949e; }
  .refresh-timer { font-size: 11px; color: #8b949e; background: #21262d; padding: 2px 8px; border-radius: 4px; font-variant-numeric: tabular-nums; }
  .interval-btns button:hover { border-color: #58a6ff; color: #58a6ff; }
  .interval-btns button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .cw { width: 100%; position: relative; overflow: hidden; cursor: crosshair; }
  .cw-main { height: 340px; }
  .cw-sub { height: 140px; cursor: crosshair; }
  .cw .msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #484f58; font-size: 12px; pointer-events: none; }
  .zoom-overlay { position: absolute; top: 0; bottom: 20px; background: rgba(49,130,246,0.12); border-left: 1px solid rgba(49,130,246,0.5); border-right: 1px solid rgba(49,130,246,0.5); pointer-events: none; display: none; z-index: 10; }
  .ma-legend { display: flex; gap: 8px; padding: 2px 14px 0; flex-wrap: wrap; }
  .ma-legend span { font-size: 10px; font-weight: 600; display: flex; align-items: center; gap: 3px; }
  .ma-legend .dot { width: 10px; height: 2px; border-radius: 1px; display: inline-block; }
  .fg-header { display: flex; align-items: baseline; gap: 6px; padding: 0 14px; }
  .fg-score { font-size: 18px; font-weight: 800; color: #f0f6fc; }
  .fg-label { font-size: 11px; font-weight: 600; }
  .scrollbar { width: 100%; height: 14px; background: #1c2128; border: 1px solid #21262d; border-top: none; border-radius: 0 0 10px 10px; position: relative; cursor: pointer; }
  .sb-thumb { position: absolute; height: 8px; top: 2px; background: #30363d; border-radius: 4px; cursor: grab; min-width: 24px; }
  .sb-thumb:hover, .sb-thumb.dragging { background: #58a6ff; }
  .events { max-width: 1600px; margin: 0 auto 20px; padding: 0 10px; display: flex; gap: 10px; }
  .events-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; flex: 1; min-width: 0; }
  .events-card h2 { font-size: 13px; font-weight: 600; color: #f0f6fc; padding: 10px 16px; border-bottom: 1px solid #21262d; background: #1c2128; }
  .links-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; flex: 1; min-width: 0; align-self: flex-start; }
  .links-card h2 { font-size: 13px; font-weight: 600; color: #f0f6fc; padding: 10px 16px; border-bottom: 1px solid #21262d; background: #1c2128; }
  .links-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .links-grid a { display: flex; align-items: center; gap: 8px; padding: 20px 16px; color: #c9d1d9; text-decoration: none; font-size: 13px; border-bottom: 1px solid #1e2229; transition: background 0.15s; }

  .links-card .link-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ev-table { border-collapse: collapse; font-size: 13px; }

  @media (max-width: 860px) { .main { flex-direction: column; } }

<script>
// ── Clock ──
(function tick(){const d=new Date(),f=n=>String(n).padStart(2,'0');document.getElementById('clock').textContent=`${d.getFullYear()}.${f(d.getMonth()+1)}.${f(d.getDate())} ${f(d.getHours())}:${f(d.getMinutes())}:${f(d.getSeconds())}`;setTimeout(tick,1000)})();

// ── CORS fetch — parallel race with timeout ──
async function fetchJSON(url){
  const urls=[url,'https://corsproxy.io/?'+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];
  const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),15000);
  try{
    const result=await Promise.any(urls.map(async u=>{const r=await fetch(u,{signal:ctrl.signal});if(!r.ok)throw 0;return r.json()}));
    clearTimeout(tid);return result;
  }catch(e){clearTimeout(tid);throw new Error('fetch failed')}
}

// ── Yahoo Finance ──
async function getData(sym,range){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=${range}&interval=1d&includePrePost=false&_t=${Date.now()}`;
  const json=await fetchJSON(url);const res=json.chart.result[0];
  const ts=res.timestamp,q=res.indicators.quote[0],m=res.meta;const candles=[];
  for(let i=0;i<ts.length;i++){if(q.open[i]==null||q.close[i]==null)continue;const dt=new Date(ts[i]*1000);
    candles.push({time:`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`,open:q.open[i],high:q.high[i],low:q.low[i],close:q.close[i]});}
  return{candles,price:m.regularMarketPrice,prev:m.chartPreviousClose};
}

// ── Math helpers ──
function calcRSI(closes,period=14){const rsi=[];let ag=0,al=0;for(let i=1;i<closes.length;i++){const d=closes[i]-closes[i-1],g=d>0?d:0,l=d<0?-d:0;if(i<=period){ag+=g;al+=l;if(i===period){ag/=period;al/=period;rsi.push(100-100/(1+(al===0?100:ag/al)))}else rsi.push(null)}else{ag=(ag*(period-1)+g)/period;al=(al*(period-1)+l)/period;rsi.push(100-100/(1+(al===0?100:ag/al)))}}return rsi}
function calcSMA(arr,p){const r=[];for(let i=0;i<arr.length;i++){if(i<p-1){r.push(null);continue}let s=0;for(let j=i-p+1;j<=i;j++)s+=arr[j];r.push(s/p)}return r}

// ═══════════════════════════════════
// CHART SYSTEM — synced columns
// ═══════════════════════════════════
const allCharts = {}; // id → { chart, series, el }
const colGroups = { kr: [], us: [] }; // chart ids per column
const colStartDate = { kr: null, us: null }; // earliest date per column for data padding
const colTimeIndex = { kr: [], us: [] }; // full time keys from main chart
const colRange = { kr: '10y', us: '10y' };
const colInterval = { kr: '1d', us: '1d' };
let syncing = false;
// crosshair sync handled by custom overlay xline

// Weekly resample helpers
function getWeekKey(t){const d=new Date(t+'T12:00:00'),day=d.getDay(),diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10)}
function resampleWeekly(data){if(!data.length)return data;const m=new Map();data.forEach(d=>{const wk=getWeekKey(d.time);m.set(wk,d)});return[...m.values()].sort((a,b)=>a.time.localeCompare(b.time))}
function candlesToWeekly(candles){if(!candles.length)return candles;const weeks=[];let cur=null;candles.forEach(c=>{const wk=getWeekKey(c.time);if(!cur||cur._wk!==wk){if(cur){const{_wk,...rest}=cur;weeks.push(rest)}cur={time:c.time,open:c.open,high:c.high,low:c.low,close:c.close,_wk:wk}}else{cur.time=c.time;cur.high=Math.max(cur.high,c.high);cur.low=Math.min(cur.low,c.low);cur.close=c.close}});if(cur){const{_wk,...rest}=cur;weeks.push(rest)}return weeks}

const CHART_OPTS = (bg='#161b22') => ({
  layout:{background:{type:'solid',color:bg},textColor:'#8b949e',fontSize:10},
  grid:{vertLines:{color:'#1e2229'},horzLines:{color:'#1e2229'}},
  crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{visible:false}},
  rightPriceScale:{borderColor:'#21262d',minimumWidth:130},
  handleScale:false,handleScroll:false
});

// Data cache to avoid duplicate fetches
const dataCache = {};
async function getCachedData(sym, range) {
  const key = sym + '|' + range;
  if (!dataCache[key]) {
    dataCache[key] = getData(sym, range).catch(e => { delete dataCache[key]; throw e; });
  }
  return dataCache[key];
}

function createChart(id, col, opts = {}) {
  const el = document.getElementById('cw-' + id);
  const chart = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: el.clientHeight,
    ...CHART_OPTS(),
    timeScale: {
      borderColor: '#21262d', timeVisible: false,
      visible: opts.showTimeAxis !== false
    }
  });

  allCharts[id] = { chart, el, col };
  colGroups[col].push(id);

  // Resize
  new ResizeObserver(entries => {
    const r = entries[0].contentRect;
    chart.applyOptions({ width: r.width, height: r.height });
  }).observe(el);

  // Sync time scale across column — use LOGICAL range (index-based, pixel-perfect)
  chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
    if (syncing) return;
    const logicalRange = chart.timeScale().getVisibleLogicalRange();
    if (!logicalRange) return;
    syncing = true;
    colGroups[col].forEach(otherId => {
      if (otherId !== id && allCharts[otherId]) {
        try { allCharts[otherId].chart.timeScale().setVisibleLogicalRange(logicalRange); } catch(_){}
      }
    });
    // Update bar count display for main charts
    if (id === 'kospi' || id === 'ndx') {
      const barInput = document.getElementById('bars-' + col);
      if (barInput && !barInput.matches(':focus')) {
        const visibleBars = Math.round(logicalRange.to - logicalRange.from);
        barInput.value = visibleBars > 0 ? visibleBars : '';
      }
    }
    requestAnimationFrame(() => { syncing = false; });
  });

  // Crosshair sync + header value update + marker dots on sub-charts
  chart.subscribeCrosshairMove(param => {
    if (param.time) {
      colGroups[col].forEach(cid => {
        updateHeaderForChart(cid, param.time);
        // Show marker dot on sub-charts (not on main index)
        const mainId = col === 'kr' ? 'kospi' : 'ndx';
        if (cid !== mainId && allCharts[cid] && allCharts[cid].series && chartDataMap[cid]) {
          const d = chartDataMap[cid][param.time];
          if (d && d.value != null) {
            allCharts[cid].series.setMarkers([{
              time: param.time,
              position: 'inBar',
              color: 'rgb(210,175,100)',
              shape: 'circle',
              size: 0.5
            }]);
          }
        }
      });
    } else {
      restoreHeaders(col);
      // Clear markers on all sub-charts
      const mainId = col === 'kr' ? 'kospi' : 'ndx';
      colGroups[col].forEach(cid => {
        if (cid !== mainId && allCharts[cid] && allCharts[cid].series) {
          allCharts[cid].series.setMarkers([]);
        }
      });
    }
  });

  // Column crosshair overlay line — position from this chart's mousemove
  const colEl = document.getElementById('col-' + col);
  const xline = document.getElementById('xline-' + col);
  el.addEventListener('mousemove', e => {
    const colRect = colEl.getBoundingClientRect();
    xline.style.left = (e.clientX - colRect.left) + 'px';
    xline.style.display = 'block';
  });
  el.addEventListener('mouseleave', () => { xline.style.display = 'none'; });

  // Wheel → scroll 1 bar, clamped so last bar can't scroll past right edge
  el.addEventListener('wheel', (e) => {
    e.preventDefault();
    const lr = chart.timeScale().getVisibleLogicalRange();
    if (!lr) return;
    const mainId = col === 'kr' ? 'kospi' : 'ndx';
    const dataLen = chartDataMap[mainId] ? Object.keys(chartDataMap[mainId]).length : 0;
    const shift = e.deltaY > 0 ? -1 : 1;
    const newTo = lr.to + shift;
    if (shift > 0 && newTo > dataLen) return; // block scrolling past last bar
    chart.timeScale().setVisibleLogicalRange({ from: lr.from + shift, to: newTo });
  }, { passive: false });

  // Drag-to-zoom (ALL charts) — document-level handlers for drag-outside support
  const overlay = document.createElement('div');
  overlay.className = 'zoom-overlay'; el.appendChild(overlay);
  let ds = null;
  el.addEventListener('mousedown', e => { if(e.button===0){const r=el.getBoundingClientRect();ds={sx:e.clientX,rl:r.left,chart,el};overlay.style.display='none'} });
  const onMove = e => { if(!ds||ds.el!==el)return;const dx=e.clientX-ds.sx;
    if(dx>10){overlay.style.display='block';overlay.style.left=(ds.sx-ds.rl)+'px';overlay.style.width=Math.min(dx,el.clientWidth-(ds.sx-ds.rl))+'px';overlay.style.background='rgba(49,130,246,0.12)'}
    else if(dx<-10){const l=Math.max(0,e.clientX-ds.rl);overlay.style.display='block';overlay.style.left=l+'px';overlay.style.width=(ds.sx-ds.rl-l)+'px';overlay.style.background='rgba(231,76,60,0.12)'}
    else overlay.style.display='none';};
  el.addEventListener('mousemove', onMove);
  const finishDrag = e => { if(!ds||ds.el!==el)return;overlay.style.display='none';
    const rect=el.getBoundingClientRect(),outside=e.clientX<rect.left||e.clientX>rect.right||e.clientY<rect.top||e.clientY>rect.bottom;
    if(outside){
      // Snap to rightmost candle at current zoom level
      const lr=chart.timeScale().getVisibleLogicalRange();
      if(lr){const span=lr.to-lr.from;chart.timeScale().setVisibleLogicalRange({from:lr.to-span*0.3,to:lr.to+2})}
      ds=null;return;
    }
    const dx=e.clientX-ds.sx,ew=el.clientWidth;
    if(dx>20){const lr=chart.timeScale().getVisibleLogicalRange();if(lr){const tb=lr.to-lr.from,sp=(ds.sx-ds.rl)/ew,ep=(e.clientX-ds.rl)/ew;chart.timeScale().setVisibleLogicalRange({from:lr.from+tb*sp,to:lr.from+tb*ep})}}
    else if(dx<-20)chart.timeScale().fitContent();ds=null;};
  document.addEventListener('mouseup', finishDrag);

  return chart;
}

// Format time for date label display
function formatDate(t) {
  if (typeof t === 'string') return t;
  if (t.year) return `${t.year}-${String(t.month).padStart(2,'0')}-${String(t.day).padStart(2,'0')}`;
  return '';
}

// Update header value from crosshair time for a specific chart
function updateHeaderForChart(chartId, time) {
  const map = chartDataMap[chartId];
  if (!map) return;
  const d = map[time];
  if (!d) return;
  // Update date label on sub-charts
  const dateEl = document.getElementById('d-' + chartId);
  if (dateEl) dateEl.textContent = formatDate(d.time || time);
  if (chartId === 'kospi' || chartId === 'ndx') {
    const pe = document.getElementById('p-' + chartId);
    if (pe && d.close != null) pe.textContent = d.close.toLocaleString('en-US', {maximumFractionDigits:2});
  } else if (chartId === 'kr-fg' || chartId === 'us-fg') {
    const v = d.value != null ? Math.round(d.value) : null;
    if (v != null) { const lbl = getLabel(v); document.getElementById(chartId+'-val').textContent = v; const le = document.getElementById(chartId+'-lbl'); le.textContent = lbl.t; le.style.color = lbl.c; }
  } else {
    const pe = document.getElementById('p-' + chartId);
    if (pe && d.value != null) {
      if (chartId === 'nyse200' || chartId === 'nyse50') pe.textContent = d.value.toFixed(1) + '%';
      else if (chartId === 'usdkrw') pe.textContent = d.value.toLocaleString('en-US', {maximumFractionDigits:2});
      else pe.textContent = d.value;
    }
  }
}

// Build time-indexed map from data array
function buildDataMap(chartId, dataArr) {
  const map = {};
  dataArr.forEach(d => { map[d.time] = d; });
  chartDataMap[chartId] = map;
}

function restoreHeaders(col) {
  const ids = col === 'kr' ? ['kospi','kr-fg','adr','usdkrw'] : ['ndx','us-fg','nyse200','nyse50'];
  ids.forEach(cid => {
    if (origValues[cid]) origValues[cid]();
    const dateEl = document.getElementById('d-' + cid);
    if (dateEl) dateEl.textContent = '';
  });
}

// Align sub-chart data to main chart's exact time index (forward-fill, always full length)
function alignToTimeIndex(data, col) {
  const idx = colTimeIndex[col];
  if (!idx || !idx.length || !data.length) return data;
  const map = {};
  data.forEach(d => { map[d.time] = d.value != null ? d.value : d.close; });
  const firstVal = data[0].value != null ? data[0].value : data[0].close;
  const result = [];
  let lastVal = firstVal;
  for (const t of idx) {
    if (map[t] !== undefined) lastVal = map[t];
    result.push({ time: t, value: lastVal });
  }
  return result;
}

// MDD (Max Drawdown) — calculates running drawdown from peak
function calcMDD(candles) {
  let peak = -Infinity;
  return candles.map(c => {
    if (c.close > peak) peak = c.close;
    const dd = ((c.close - peak) / peak) * 100; // always <= 0
    return { time: c.time, value: parseFloat(dd.toFixed(2)) };
  });
}

// KR Fear/Greed
function calcKrFG(kospi, fx) {
  const c=kospi.map(x=>x.close),t=kospi.map(x=>x.time);
  const sma125=calcSMA(c,125),rsi=calcRSI(c);
  const ret=[];for(let i=1;i<c.length;i++)ret.push(Math.log(c[i]/c[i-1]));
  const v20=[],v50=[];
  for(let i=0;i<ret.length;i++){
    if(i>=19){let s=0;for(let j=i-19;j<=i;j++)s+=ret[j]*ret[j];v20.push(Math.sqrt(s/20)*Math.sqrt(252)*100)}else v20.push(null);
    if(i>=49){let s=0;for(let j=i-49;j<=i;j++)s+=ret[j]*ret[j];v50.push(Math.sqrt(s/50)*Math.sqrt(252)*100)}else v50.push(null);
  }
  const fxMap={};if(fx)fx.forEach(x=>{fxMap[x.time]=x.close});
  const fxA=[];let lf=null;for(const tt of t){if(fxMap[tt])lf=fxMap[tt];fxA.push(lf)}
  const out=[];
  for(let i=125;i<c.length;i++){
    const ma=sma125[i];if(!ma)continue;
    const r=rsi[i-1];if(r==null)continue;
    const v2=v20[i-1],v5=v50[i-1];if(v2==null||v5==null)continue;
    const mom=Math.max(0,Math.min(100,50+((c[i]-ma)/ma)*300));
    const str=Math.max(0,Math.min(100,(r-25)*2));
    let ups=0;for(let j=i-19;j<=i;j++)if(kospi[j].close>kospi[j].open)ups++;
    const brd=(ups/20)*100;
    const vol=Math.max(0,Math.min(100,100-(v2/v5-0.5)*100));
    let sh=50;if(i>=20&&fxA[i]&&fxA[i-20]){const sr=(c[i]-c[i-20])/c[i-20]*100,fr=(fxA[i]-fxA[i-20])/fxA[i-20]*100;sh=Math.max(0,Math.min(100,50+(sr-fr*3)*3))}
    out.push({time:t[i],value:Math.max(0,Math.min(100,Math.round(mom*.25+str*.2+brd*.15+vol*.25+sh*.15)))});
  }
  return out;
}

// US Fear/Greed (DIY 5-factor: momentum/RSI/breadth/volatility/safe-haven)
// Mirrors KR F&G structure but uses SPY+TLT for safe-haven instead of USD/KRW
function calcUsFG(ndxCandles, tltCandles) {
  const c = ndxCandles.map(x => x.close), t = ndxCandles.map(x => x.time);
  const sma125 = calcSMA(c, 125), rsi = calcRSI(c);
  // Log returns for volatility
  const ret = []; for (let i = 1; i < c.length; i++) ret.push(Math.log(c[i] / c[i - 1]));
  const v20 = [], v50 = [];
  for (let i = 0; i < ret.length; i++) {
    if (i >= 19) { let s = 0; for (let j = i - 19; j <= i; j++) s += ret[j] * ret[j]; v20.push(Math.sqrt(s / 20) * Math.sqrt(252) * 100); } else v20.push(null);
    if (i >= 49) { let s = 0; for (let j = i - 49; j <= i; j++) s += ret[j] * ret[j]; v50.push(Math.sqrt(s / 50) * Math.sqrt(252) * 100); } else v50.push(null);
  }
  // TLT (bond) price map for safe-haven
  const tltMap = {}; if (tltCandles) tltCandles.forEach(x => { tltMap[x.time] = x.close; });
  const tltA = []; let lt = null; for (const tt of t) { if (tltMap[tt]) lt = tltMap[tt]; tltA.push(lt); }
  const out = [];
  for (let i = 125; i < c.length; i++) {
    const ma = sma125[i]; if (!ma) continue;
    const r = rsi[i - 1]; if (r == null) continue;
    const v2 = v20[i - 1], v5 = v50[i - 1]; if (v2 == null || v5 == null) continue;
    // 1. Momentum (25%): price vs SMA(125)
    const mom = Math.max(0, Math.min(100, 50 + ((c[i] - ma) / ma) * 300));
    // 2. Strength (20%): RSI normalized
    const str = Math.max(0, Math.min(100, (r - 25) * 2));
    // 3. Breadth (15%): % of up candles in last 20 days
    let ups = 0; for (let j = i - 19; j <= i; j++) if (ndxCandles[j].close > ndxCandles[j].open) ups++;
    const brd = (ups / 20) * 100;
    // 4. Volatility (25%): low short-term vol vs long-term = greed
    const vol = Math.max(0, Math.min(100, 100 - (v2 / v5 - 0.5) * 100));
    // 5. Safe Haven (15%): stock return vs bond(TLT) return over 20 days
    // Stocks outperforming bonds = greed, bonds outperforming = fear
    let sh = 50;
    if (i >= 20 && tltA[i] && tltA[i - 20]) {
      const stockRet = (c[i] - c[i - 20]) / c[i - 20] * 100;
      const bondRet = (tltA[i] - tltA[i - 20]) / tltA[i - 20] * 100;
      sh = Math.max(0, Math.min(100, 50 + (stockRet - bondRet) * 3));
    }
    out.push({ time: t[i], value: Math.max(0, Math.min(100, Math.round(mom * .25 + str * .2 + brd * .15 + vol * .25 + sh * .15))) });
  }
  return out;
}

// Sync all sub-charts to main chart's logical range
function syncColumnToMain(mainId) {
  const main = allCharts[mainId];
  if (!main) return;
  const logicalRange = main.chart.timeScale().getVisibleLogicalRange();
  if (!logicalRange) return;
  const col = main.col;
  colGroups[col].forEach(otherId => {
    if (otherId !== mainId && allCharts[otherId]) {
      try { allCharts[otherId].chart.timeScale().setVisibleLogicalRange(logicalRange); } catch(_){}
    }
  });
}

// ── Full column reload ──
async function loadColumn(col) {
  const mainId = col === 'kr' ? 'kospi' : 'ndx';
  // Load index first (sets colStartDate for padding)
  if (col === 'kr') { await loadIndex('kospi', 'kr'); }
  else { await loadIndex('ndx', 'us'); }
  // Then load all sub-indicators in parallel
  if (col === 'kr') {
    await Promise.allSettled([loadMDD('kospi','kr-mdd','kr'), loadKrFG(), loadADR(), loadUSDKRW()]);
  } else {
    await Promise.allSettled([loadMDD('ndx','us-mdd','us'), loadUSFG(), loadNYSE200(), loadNYSE50()]);
  }
  if (allCharts[mainId]) {
    // Default view: last 120 bars
    const dataLen = chartDataMap[mainId] ? Object.keys(chartDataMap[mainId]).length : 0;
    if (dataLen > 0) {
      const from = Math.max(0, dataLen - 120);
      allCharts[mainId].chart.timeScale().setVisibleLogicalRange({ from, to: dataLen });
      const barInput = document.getElementById('bars-' + col);
      if (barInput) barInput.value = Math.min(120, dataLen);
    } else {
      allCharts[mainId].chart.timeScale().fitContent();
    }
    setTimeout(() => syncColumnToMain(mainId), 100);
  }
}

// ── Scrollbar sync ──
function setupScrollbar(col, mainId) {
  const track = document.getElementById('sb-' + col);
  const thumb = document.getElementById('sb-thumb-' + col);
  if (!track || !thumb) return;
  let dragging = false, startX = 0, startLeft = 0;

  // Update thumb from chart visible range
  function updateThumb() {
    const ch = allCharts[mainId];
    if (!ch) return;
    const lr = ch.chart.timeScale().getVisibleLogicalRange();
    if (!lr) return;
    const dataLen = chartDataMap[mainId] ? Object.keys(chartDataMap[mainId]).length : 300;
    const totalBars = Math.max(dataLen, lr.to);
    const tw = track.clientWidth;
    const thumbW = Math.max(24, (lr.to - lr.from) / totalBars * tw);
    const thumbL = Math.max(0, Math.min(tw - thumbW, lr.from / totalBars * tw));
    thumb.style.width = thumbW + 'px';
    thumb.style.left = thumbL + 'px';
  }

  // Listen to main chart's visible range changes
  const checkInterval = setInterval(() => {
    if (allCharts[mainId]) {
      allCharts[mainId].chart.timeScale().subscribeVisibleLogicalRangeChange(updateThumb);
      clearInterval(checkInterval);
    }
  }, 300);

  // Thumb drag → scroll chart
  thumb.addEventListener('mousedown', e => {
    e.preventDefault(); dragging = true; startX = e.clientX; startLeft = parseFloat(thumb.style.left) || 0;
    thumb.classList.add('dragging');
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const ch = allCharts[mainId]; if (!ch) return;
    const dx = e.clientX - startX;
    const tw = track.clientWidth;
    const newLeft = Math.max(0, Math.min(tw - thumb.clientWidth, startLeft + dx));
    thumb.style.left = newLeft + 'px';
    const dataLen = chartDataMap[mainId] ? Object.keys(chartDataMap[mainId]).length : 300;
    const lr = ch.chart.timeScale().getVisibleLogicalRange();
    if (!lr) return;
    const span = lr.to - lr.from;
    const newFrom = newLeft / tw * dataLen;
    ch.chart.timeScale().setVisibleLogicalRange({ from: newFrom, to: newFrom + span });
  });
  document.addEventListener('mouseup', () => { if (dragging) { dragging = false; thumb.classList.remove('dragging'); } });

  // Click track → jump to position
  track.addEventListener('click', e => {
    if (e.target === thumb) return;
    const ch = allCharts[mainId]; if (!ch) return;
    const rect = track.getBoundingClientRect();
    const clickRatio = (e.clientX - rect.left) / rect.width;
    const dataLen = chartDataMap[mainId] ? Object.keys(chartDataMap[mainId]).length : 300;
    const lr = ch.chart.timeScale().getVisibleLogicalRange(); if (!lr) return;
    const span = lr.to - lr.from;
    const newFrom = clickRatio * dataLen - span / 2;
    ch.chart.timeScale().setVisibleLogicalRange({ from: newFrom, to: newFrom + span });
  });
}

// ── Auto-refresh at fixed :00 :15 :30 :45 ──
let lastRefreshSlot = -1;
function getNextSlot() {
  const now = new Date(), m = now.getMinutes(), s = now.getSeconds();
  const cur = m - (m % 15); // current slot start (0,15,30,45)
  const next = cur + 15; // next slot
  const secsLeft = (next - m) * 60 - s;
  return { curSlot: now.getHours() * 60 + cur, secsLeft };
}
async function refreshAllData() {
  const timerEl = document.getElementById('refresh-timer');
  if (timerEl) timerEl.textContent = '갱신 중...';
  const savedRanges = {};
  for (const [id, obj] of Object.entries(allCharts)) {
    try { const lr = obj.chart.timeScale().getVisibleLogicalRange(); if (lr) savedRanges[id] = lr; } catch(_) {}
  }
  for (const key of Object.keys(dataCache)) delete dataCache[key];
  await Promise.allSettled([loadColumn('kr'), loadColumn('us')]);
  for (const [id, lr] of Object.entries(savedRanges)) {
    if (allCharts[id]) { try { allCharts[id].chart.timeScale().setVisibleLogicalRange(lr); } catch(_) {} }
  }
}
// Check every second: countdown + trigger at slot boundary
setInterval(() => {
  const { curSlot, secsLeft } = getNextSlot();
  const timerEl = document.getElementById('refresh-timer');
  // Trigger refresh when new slot arrived
  if (lastRefreshSlot >= 0 && curSlot !== lastRefreshSlot) {
    lastRefreshSlot = curSlot;
    refreshAllData();
    return;
  }
  lastRefreshSlot = curSlot;
  const m = Math.floor(secsLeft / 60), s = secsLeft % 60;
  if (timerEl) timerEl.textContent = `갱신 ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}, 1000);

// ── INIT ──
window.addEventListener('load',()=>{
  setTimeout(async()=>{
    await Promise.allSettled([loadColumn('kr'), loadColumn('us')]);
    setupScrollbar('kr', 'kospi');
    setupScrollbar('us', 'ndx');
    // Auto-refresh every 15 minutes
    setInterval(refreshAllData, 15 * 60 * 1000);
  },200);
});
</script>
