# KRX KR 지표 자동 갱신 (V-KOSPI + Put/Call)
# ----------------------------------------------------------
# KRX OpenAPI에서 신규 일자만 incremental pull → data/kr_vkospi.json,
# data/kr_putcall.json 갱신 → 변경 시 자동 커밋
#
# ※ ADR 백필(kr_adr_backfill_local.py)은 pykrx 기반이라
#   GitHub Actions(미국 IP)에서 KRX가 차단함 → 자동 갱신 대상에서 제외.
#   ADR 갱신은 로컬에서 수동 실행 후 push, 또는 raw HTTP endpoint로 추후 마이그레이션.
#
# 스케줄 (KRX 데이터 일배치 확정 시간 16:00~17:00 KST 이후):
#   - 매일 10:00 UTC = 19:00 KST  (1차 — 데이터 확정 후)
#   - 매일 13:00 UTC = 22:00 KST  (2차 — 백업, 1차 실패 대비)
#   - workflow_dispatch: 수동 실행
#
# 백필 스크립트는 기존 JSON에 있는 일자는 skip 하므로 매일 호출해도
# 신규 1~2 영업일만 KRX API 호출 → rate limit 부담 없음.
#
# Secret 의존: KRX_AUTH_KEY (Settings → Secrets and variables → Actions)
# ----------------------------------------------------------

name: KRX KR Indicators Update

on:
  schedule:
    - cron: '0 10 * * *'   # 19:00 KST — 데이터 확정 후 1차
    - cron: '0 13 * * *'   # 22:00 KST — 백업
  workflow_dispatch:        # 수동 실행

permissions:
  contents: write           # data/*.json 커밋/푸시 권한

concurrency:
  group: krx-kr-indicators-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: KRX AUTH_KEY 환경변수 설정
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: |
          if [ -z "$KRX_AUTH_KEY" ]; then
            echo "::error::KRX_AUTH_KEY secret이 등록되지 않았습니다."
            exit 1
          fi
          # 백필 스크립트는 환경변수 OR .krx_auth_key 파일 둘 다 지원 — 환경변수 사용
          echo "KRX_AUTH_KEY length=${#KRX_AUTH_KEY}"

      - name: 오늘 날짜 계산 (KST 기준)
        id: dates
        run: |
          # KRX 영업일 기준 — UTC+9 시간대로 오늘 날짜
          TODAY_KST=$(TZ=Asia/Seoul date +%Y%m%d)
          echo "today=${TODAY_KST}" >> $GITHUB_OUTPUT
          echo "오늘 (KST): ${TODAY_KST}"

      - name: V-KOSPI 갱신 (incremental)
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python -u kr_vkospi_backfill_local.py --backfill 20100104 ${{ steps.dates.outputs.today }}
        continue-on-error: true

      - name: Put/Call 갱신 (incremental)
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python -u kr_putcall_backfill_local.py --backfill 20100104 ${{ steps.dates.outputs.today }}
        continue-on-error: true

      - name: JSON 구조 검증
        run: |
          python - <<'PY'
          import json, sys
          ok = True
          for f, key in (
              ('data/kr_vkospi.json',  'data'),
              ('data/kr_putcall.json', 'data'),
          ):
              try:
                  d = json.load(open(f))
                  data = d.get(key, [])
                  last = data[-1] if data else 'EMPTY'
                  print(f"{f}: {len(data)} rows, last={last}")
                  if not data:
                      print(f"::warning::{f} 비어 있음")
                      ok = False
              except FileNotFoundError:
                  print(f"::warning::{f} 없음 (스크립트 실패 가능성)")
                  ok = False
              except Exception as e:
                  print(f"::error::{f} 검증 실패 — {e}")
                  ok = False
          # 검증 실패해도 부분 커밋은 진행 (continue-on-error 호환)
          PY

      - name: 변경사항 있을 때만 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 존재하는 파일만 stage
          for f in data/kr_vkospi.json data/kr_putcall.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "::notice::KRX KR 지표 변경 없음 — 커밋 생략"
          else
            TS=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore(data): KRX KR 지표 자동 갱신 (${TS})"
            git push
            echo "::notice::KRX KR 지표 갱신 & 푸시 완료"
          fi
