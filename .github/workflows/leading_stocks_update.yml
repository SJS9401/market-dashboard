name: ls_data_v3.json 자동 갱신
# yfinance .KS/.KQ로 30개 종목+지수 일별 OHLCV incremental fetch → ls_data_v3.json patch
# 매일 KST 17:30 (UTC 08:30) — 한국장 마감 + 데이터 안정화 후
# 변경 있을 때만 자동 commit/push

on:
  schedule:
    - cron: '30 8 * * *'    # UTC 08:30 = KST 17:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet yfinance pandas

      - name: 빌드 스크립트 실행
        id: build
        run: |
          python -u build_leading_stocks_update.py --target ls_data_v3.json
        continue-on-error: true

      - name: 변경사항 확인
        id: changed
        run: |
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "::notice::변경 없음 — 커밋 생략"
            echo "has_change=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_change=true" >> $GITHUB_OUTPUT

      - name: Commit & push
        if: steps.changed.outputs.has_change == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ls_data_v3.json Leading_stocks.html
          if git diff --cached --quiet; then
            echo "::notice::변경 없음 — 커밋 생략"
          else
            TS=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore(data): 주도주 사이클 yfinance 갱신 + HTML 재빌드 (${TS})"
            git push
            echo "::notice::ls_data_v3.json + Leading_stocks.html 갱신 완료"
          fi
