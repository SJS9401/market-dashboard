# US Breadth 자동 갱신 (시장폭 200/50MA + 골드만 시장폭 + NH/NL)
# ----------------------------------------------------------
# us_breadth_backfill_local.py 매일 1회 실행 → data/us_breadth.json 갱신
# 데이터 소스: SPX 다중 소스 폴백 (FRED → Yahoo HTTP direct → yfinance) +
#              503 종목 yfinance + Wikipedia (티커 리스트)
#
# 스케줄 (BT 데일리 프리뷰 07:20 KST 시작 — 07:00 KST 이전 갱신 완료 목표):
# 미국 close 16:00 ET = 한국 05:00 (DST 3-11월) / 06:00 (표준시 11-3월).
#   - 매일 21:30 UTC = 한국 06:30 (1차 — DST: close+1.5h, 표준시: close+0.5h)
#   - 매일 22:30 UTC = 한국 07:30 (2차 — 1차 fail retry, 데일리 프리뷰 시작 직후 보완)
#   - 매일 02:30 UTC = 한국 11:30 (3차 안전망)
#   - workflow_dispatch: 수동 실행
#
# 매 실행은 풀 백필 (10년 + 500종목, 약 5~10분). 신규 영업일 1~2개만
# 결과적으로 새로 추가되지만 rolling 계산 특성상 풀 다운로드가 안전.
#
# Secret 의존:
#   - FRED_API_KEY (선택): 설정 시 SPX 1차 소스로 FRED SP500 series 사용.
#     없으면 Yahoo HTTP direct 가 1차로 승격. 두 경로 모두 fallback 으로 yfinance.
# ----------------------------------------------------------

name: US Breadth Update

on:
  schedule:
    - cron: '0 21 * * *'    # 06:00 KST — 1차 (BT 데일리 프리뷰 07:10~15 시작 전 안정적 갱신, 2026-05-28 추가)
    - cron: '30 21 * * *'   # 06:30 KST — 2차 (기존 1차, 1차 fail retry)
    - cron: '30 22 * * *'   # 07:30 KST — 3차 (1·2차 모두 fail 시 후행 보완)
    - cron: '30 2 * * *'    # 11:30 KST — 4차 안전망
  workflow_dispatch:        # 수동 실행

permissions:
  contents: write           # data/us_breadth.json 커밋/푸시 권한

concurrency:
  group: us-breadth-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests lxml html5lib

      - name: 백필 시작/종료 날짜 계산
        id: dates
        run: |
          # SPX 데이터 시작은 2015-01-01 고정, 종료는 오늘 (UTC)
          TODAY=$(date -u +%Y-%m-%d)
          echo "start=2015-01-01" >> $GITHUB_OUTPUT
          echo "end=${TODAY}" >> $GITHUB_OUTPUT
          echo "백필 기간: 2015-01-01 → ${TODAY}"

      - name: 풀 백필 실행
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -u us_breadth_backfill_local.py --backfill ${{ steps.dates.outputs.start }} ${{ steps.dates.outputs.end }}
        timeout-minutes: 25

      - name: JSON 구조 검증
        run: |
          python - <<'PY'
          import json, sys
          from datetime import date, datetime, timedelta
          d = json.load(open('data/us_breadth.json'))
          required = ['dates', 'spx', 'pct_above_200ma', 'pct_above_50ma',
                      'goldman_breadth', 'new_highs_pct', 'new_lows_pct']
          for k in required:
              if k not in d:
                  print(f"::error::missing key: {k}")
                  sys.exit(1)
              if not isinstance(d[k], list) or not d[k]:
                  print(f"::error::empty: {k}")
                  sys.exit(1)
          n = len(d['dates'])
          last = d['dates'][-1]
          last_d = datetime.strptime(last, "%Y-%m-%d").date()
          today = datetime.utcnow().date()

          # business-day staleness check: count weekdays between last and today
          bd = 0
          cur = last_d
          while cur < today:
              cur += timedelta(days=1)
              if cur.weekday() < 5:  # Mon-Fri
                  bd += 1
          MAX_STALE_BDAYS = 5
          stale = bd > MAX_STALE_BDAYS

          print(f"rows: {n}, last date: {last}  (today={today}, business_days_since_last={bd})")
          print(f"  SPX: {d['spx'][-1]}")
          print(f"  >200MA: {d['pct_above_200ma'][-1]}%  >50MA: {d['pct_above_50ma'][-1]}%")
          print(f"  Goldman breadth: {d['goldman_breadth'][-1]}%p")
          print(f"  NH%: {d['new_highs_pct'][-1]}  NL%: {d['new_lows_pct'][-1]}")

          if stale:
              print(f"::error::data is stale: last_date={last} is {bd} business days old (threshold={MAX_STALE_BDAYS}). yfinance likely returned cached/throttled response.")
              sys.exit(1)
          else:
              print(f"::notice::data freshness OK: last_date={last} ({bd} business days old)")
          PY

      - name: 변경사항 있을 때만 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/us_breadth.json data/us_breadth_health.json
          if git diff --cached --quiet; then
            echo "::notice::us_breadth 데이터 변경 없음 — 커밋 생략"
          else
            TS=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore(data): us_breadth + health 자동 갱신 (${TS})"
            git push
            echo "::notice::us_breadth.json + health.json 갱신 & 푸시 완료"
          fi
